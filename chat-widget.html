<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反響対応アシスタント</title>
<style>
  :root {
    --ink: #2B2A28;
    --paper: #FBF8F3;
    --clay: #B5673A;
    --moss: #5C6B4F;
    --line: #E3DCD0;
    --bubble-bot: #F2ECE0;
    --bubble-user: #2B2A28;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
  }

  body {
    font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", -apple-system, sans-serif;
    color: var(--ink);
  }

  #widget-root {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 640px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(43, 42, 40, 0.10);
  }

  /* ---------- Header ---------- */
  .chat-header {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .chat-header .badge {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: var(--clay);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .chat-header .titles {
    display: flex;
    flex-direction: column;
    line-height: 1.3;
  }

  .chat-header .titles .t1 {
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .chat-header .titles .t2 {
    font-size: 11.5px;
    color: #C9C2B4;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #7FA06B;
    display: inline-block;
  }

  /* ---------- Messages ---------- */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-body::-webkit-scrollbar { width: 6px; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .row {
    display: flex;
    width: 100%;
  }
  .row.bot { justify-content: flex-start; }
  .row.user { justify-content: flex-end; }

  .bubble {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13.7px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.bot {
    background: var(--bubble-bot);
    color: var(--ink);
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: var(--bubble-user);
    color: var(--paper);
    border-top-right-radius: 4px;
  }

  .bubble.fallback {
    background: #FBEDE6;
    border: 1px solid #E9C9B8;
    color: #8C4A2A;
  }

  .category-tag {
    display: inline-block;
    font-size: 10.5px;
    color: var(--moss);
    background: #EBEFE4;
    border-radius: 5px;
    padding: 2px 7px;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 13px;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #B8AF9E;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- Suggested questions ---------- */
  .suggestions {
    padding: 0 14px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
  }

  .chip {
    font-size: 12px;
    padding: 7px 11px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .chip:hover {
    background: var(--bubble-bot);
    border-color: var(--clay);
  }

  /* ---------- Input ---------- */
  .chat-input {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    background: var(--paper);
    flex-shrink: 0;
  }

  .chat-input input {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 15px;
    font-size: 13.5px;
    outline: none;
    background: #fff;
    color: var(--ink);
    font-family: inherit;
  }
  .chat-input input:focus {
    border-color: var(--clay);
  }

  .chat-input button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--clay);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  .chat-input button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .chat-input button:not(:disabled):active {
    transform: scale(0.93);
  }

  .footnote {
    text-align: center;
    font-size: 10px;
    color: #A39B8B;
    padding: 0 0 8px;
  }
</style>
</head>
<body>

/* ---------- あいまい検索ロジック（GAS未接続時のローカルフォールバック） ----------
   GAS (Code.gs) 側と同じアルゴリズムを使用:
   文字bigram（2文字組）の重なり度（Diceの係数）＋同義語展開 ----------------- */
function normalize(text) {
  let t = String(text).toLowerCase();
  t = t.replace(/[！-～]/g, function (s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
  // カタカナ → ひらがな
  t = t.replace(/[\u30a1-\u30f6]/g, function (s) {
    return String.fromCharCode(s.charCodeAt(0) - 0x60);
  });
  t = t.replace(/[〜~]/g, 'ー');
  t = t.replace(/[\s　、。,.!?！？「」『』()（）・/／:：;；]/g, '');
  return t.trim();
}

const SYNONYM_GROUPS = [
  ['ある', 'あります', 'いる', 'います', '存在', '可能', 'できる', 'できます', '大丈夫', 'ok'],
  ['ない', 'なくても', 'いなくても', '不要', '無し', 'なし'],
  ['いくら', 'どのくらい', 'どれくらい', 'どれぐらい', 'どのぐらい'],
  ['いつ', 'いつまで', 'いつごろ'],
  ['飼える', '飼う', 'ペット可', 'ペット'],
  ['何件', '何個', '件数', '上限'],
  ['まで', 'までに']
];

function expandSynonyms(text) {
  let result = text;
  SYNONYM_GROUPS.forEach(function (group) {
    const canonical = group[0];
    group.slice(1).forEach(function (variant) {
      if (result.indexOf(variant) !== -1) {
        result = result.split(variant).join(canonical);
      }
    });
  });
  return result;
}

function toBigrams(text) {
  const grams = [];
  if (text.length < 2) {
    if (text.length === 1) grams.push(text);
    return grams;
  }
  for (let i = 0; i < text.length - 1; i++) grams.push(text.substring(i, i + 2));
  return grams;
}

function diceCoefficient(textA, textB) {
  const a = toBigrams(textA);
  const b = toBigrams(textB);
  if (a.length === 0 || b.length === 0) {
    return textA === textB && textA.length > 0 ? 1 : 0;
  }
  const counts = {};
  a.forEach(function (g) { counts[g] = (counts[g] || 0) + 1; });
  let common = 0;
  const bCounts = {};
  b.forEach(function (g) { bCounts[g] = (bCounts[g] || 0) + 1; });
  Object.keys(bCounts).forEach(function (g) {
    if (counts[g]) common += Math.min(counts[g], bCounts[g]);
  });
  return (2 * common) / (a.length + b.length);
}

function similarity(userTextRaw, sheetTextRaw) {
  if (!userTextRaw || !sheetTextRaw) return 0;
  const userText = expandSynonyms(userTextRaw);
  const sheetText = expandSynonyms(sheetTextRaw);

  const dice = diceCoefficient(userText, sheetText);

  let containBonus = 0;
  if (sheetText.indexOf(userText) !== -1 || userText.indexOf(sheetText) !== -1) {
    containBonus = 0.15;
  }

  const lenRatio = Math.min(userText.length, sheetText.length) / Math.max(userText.length, sheetText.length);
  const lengthPenalty = lenRatio < 0.2 ? 0.9 : 1;

  return Math.min((dice + containBonus) * lengthPenalty, 1);
}

const LOCAL_MATCH_THRESHOLD = 0.30;

function localFindAnswer(question) {
  const normQ = normalize(question);
  let best = null;
  let bestScore = 0;

  DEMO_DATA.forEach(function (item) {
    const normItemQ = normalize(item.question);
    const score = similarity(normQ, normItemQ);
    if (score > bestScore) {
      bestScore = score;
      best = item;
    }
  });

  if (best && bestScore >= LOCAL_MATCH_THRESHOLD) {
    return { matched: true, answer: best.answer, category: best.category };
  }
  return {
    matched: false,
    answer: '申し訳ございません。ご質問内容について自動回答ができませんでした。担当者に確認しますので、少々お待ちいただくか、お問い合わせフォームよりご連絡ください。',
    category: ''
  };
}

/* ---------- GAS APIへの問い合わせ ---------- */
async function fetchAnswerFromGAS(question) {
  const url = GAS_API_URL + '?question=' + encodeURIComponent(question);
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error: ' + res.status);
  return await res.json();
}

async function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;

  addUserMessage(text);
  userInput.value = '';
  sendBtn.disabled = true;
  showTyping();

  let result;
  try {
    if (GAS_API_URL && GAS_API_URL.indexOf('YOUR_GAS_WEB_APP_URL_HERE') === -1) {
      result = await fetchAnswerFromGAS(text);
    } else {
      // GAS未設定時はローカルのデモデータで動作確認
      await new Promise(function (r) { setTimeout(r, 450); });
      result = localFindAnswer(text);
    }
  } catch (err) {
    result = {
      matched: false,
      answer: '通信エラーが発生しました。担当者に確認しますので、しばらくしてから再度お試しください。',
      category: ''
    };
  }

  hideTyping();
  addBotMessage(result.answer, result.category, result.matched);
  sendBtn.disabled = false;
  userInput.focus();
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') handleSend();
});

/* 初期表示 */
addBotMessage('こんにちは！「反響対応アシスタント」です。物件の内見・費用・契約・審査などについて、よくあるご質問にお答えします。下の候補をタップするか、質問を入力してください。', '', true);
renderSuggestions();
</script>
