<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統合鑑定 – 夜明けのふくろう</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a18;
  --ink-mid: #4a4a44;
  --ink-light: #8a8a80;
  --paper: #f7f4ee;
  --paper-warm: #ede9df;
  --gold: #b89a5a;
  --gold-light: #d4b87a;
  --red: #8b3a2a;
  --border: rgba(26,26,24,0.12);
  --kazu-color: #7a5c9a;
  --maya-color: #2c7a5c;
  --astro-color: #2c4a8a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

/* HEADER */
header {
  position: relative;
  text-align: center;
  padding: 3rem 1rem 2rem;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 0.2em;
  color: var(--ink);
}
header p { font-size: 12px; color: var(--ink-light); margin-top: 0.5rem; letter-spacing: 0.1em; }
.top-btn {
  position: absolute; top: 1rem; right: 1rem;
  padding: 7px 16px; border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; color: var(--ink-mid); text-decoration: none;
  background: var(--paper); letter-spacing: 0.05em;
}

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); max-width: 680px; margin: 0 auto; }
.tab-btn {
  flex: 1; padding: 1rem; background: none; border: none;
  font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  color: var(--ink-light); cursor: pointer; letter-spacing: 0.1em;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab-btn.active { color: var(--ink); border-bottom-color: var(--gold); }

/* CONTAINER */
.container { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }

/* FORM */
.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; font-size: 11px; letter-spacing: 0.15em; color: var(--ink-light); margin-bottom: 0.5rem; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 4px;
  background: white; color: var(--ink); font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif; outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--gold); }
.date-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.optional-label { font-size: 10px; color: var(--gold); margin-left: 4px; }
.calc-btn {
  width: 100%; padding: 14px;
  background: var(--ink); color: var(--paper);
  border: none; font-family: 'Noto Serif JP', serif;
  font-size: 15px; letter-spacing: 0.2em; cursor: pointer;
  transition: opacity 0.2s; border-radius: 4px;
}
.calc-btn:hover { opacity: 0.82; }

/* RESULT SECTIONS */
.system-banner {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--border); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; margin-bottom: 2rem;
}
.sys-cell {
  background: var(--paper); padding: 1rem; text-align: center;
}
.sys-cell-label { font-size: 10px; letter-spacing: 0.15em; color: var(--ink-light); margin-bottom: 6px; }
.sys-cell-val { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 300; }
.sys-cell-val.kazu { color: var(--kazu-color); }
.sys-cell-val.maya { color: var(--maya-color); }
.sys-cell-val.astro { color: var(--astro-color); }

.result-block {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 1.5rem; margin-bottom: 1.5rem;
}
.result-block-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem;
  padding-bottom: 1rem; border-bottom: 1px solid var(--border);
}
.system-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.system-name { font-size: 11px; letter-spacing: 0.2em; color: var(--ink-light); }
.result-block-title { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 400; }

/* KAZU GRID */
.kazu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.kazu-cell { text-align: center; padding: 10px 4px; }
.kazu-cell-label { font-size: 10px; color: var(--ink-light); margin-bottom: 4px; letter-spacing: 0.05em; }
.kazu-cell-val { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 300; color: var(--kazu-color); }
.kazu-cell-val.master { color: var(--red); }

/* MAYA GRID */
.maya-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.maya-cell { text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 6px; }
.maya-cell-label { font-size: 10px; color: var(--ink-light); margin-bottom: 4px; }
.maya-cell-val { font-size: 15px; font-weight: 500; color: var(--maya-color); }
.maya-cell-sub { font-size: 11px; color: var(--ink-light); margin-top: 2px; }

/* ASTRO GRID */
.astro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.astro-cell { text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 6px; }
.astro-cell-label { font-size: 10px; color: var(--ink-light); margin-bottom: 4px; }
.astro-cell-val { font-size: 15px; font-weight: 500; color: var(--astro-color); }
.astro-cell-sub { font-size: 11px; color: var(--ink-light); margin-top: 2px; }

/* 統合鑑定セクション */
.sougou-section {
  background: linear-gradient(135deg, #fdf8ee 0%, #f5f0e8 100%);
  border: 1px solid rgba(184,154,90,0.35); border-radius: 8px;
  padding: 1.5rem; margin-bottom: 2rem;
}
.sougou-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem; }
.sougou-title { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 400; color: var(--ink); letter-spacing: 0.1em; }
.reading-card {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 1.2rem; margin-bottom: 1rem;
}
.reading-card-label { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light); margin-bottom: 0.5rem; }
.reading-card-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 0.7rem; }
.reading-card-body { font-size: 13px; line-height: 2; color: var(--ink-mid); }
.flower-tag { display: inline-block; font-size: 11px; color: var(--gold); border: 1px solid rgba(184,154,90,0.4); border-radius: 20px; padding: 2px 10px; margin-top: 0.7rem; }
.gift-shadow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.8rem; }
.gift-box { background: #f0f9f4; border: 1px solid rgba(44,122,92,0.2); border-radius: 6px; padding: 8px 10px; }
.shadow-box { background: #fdf8ee; border: 1px solid rgba(184,154,90,0.25); border-radius: 6px; padding: 8px 10px; }
.gift-box-label { font-size: 10px; color: #2c7a5c; margin-bottom: 3px; letter-spacing: 0.1em; }
.shadow-box-label { font-size: 10px; color: var(--gold); margin-bottom: 3px; letter-spacing: 0.1em; }
.gift-box-text, .shadow-box-text { font-size: 12px; color: var(--ink-mid); line-height: 1.6; }
.mantra-bar { background: var(--ink); color: var(--paper); text-align: center; border-radius: 6px; padding: 10px; margin-top: 0.8rem; font-family: 'Noto Serif JP', serif; font-size: 14px; letter-spacing: 0.2em; }
.synthesis-box { background: linear-gradient(135deg, #f8f5ff 0%, #f0f4ff 100%); border: 1px solid rgba(122,92,154,0.2); border-radius: 8px; padding: 1.2rem; margin-top: 1rem; }
.synthesis-label { font-size: 10px; letter-spacing: 0.2em; color: var(--kazu-color); margin-bottom: 0.6rem; }
.synthesis-text { font-size: 13px; line-height: 2.1; color: var(--ink-mid); }

@media (max-width: 500px) {
  .kazu-grid { grid-template-columns: repeat(3, 1fr); }
  .date-row { grid-template-columns: 1.5fr 1fr 1fr; }
}
</style>
</head>
<body>

<header>
  <a href="top-uranai.html" class="top-btn">← TOP</a>
  <h1>統 合 鑑 定</h1>
  <p>数秘術 × マヤ暦 × 天地ドラゴン占星術 × AI</p>
</header>

<div class="tabs">
  <button class="tab-btn active" id="tab-input-btn" onclick="switchTab('input')">入 力</button>
  <button class="tab-btn" id="tab-result-btn" onclick="switchTab('result')">鑑 定 結 果</button>
</div>

<!-- 入力タブ -->
<div class="container" id="tab-input">
  <div class="form-group">
    <label>お名前</label>
    <input type="text" id="inp-name" placeholder="山田 太郎">
  </div>
  <div class="form-group">
    <label>よみがな（ひらがな）</label>
    <input type="text" id="inp-kana" placeholder="やまだ たろう" oninput="this.value=this.value.replace(/[^ぁ-ん　 ]/g,'')">
  </div>
  <div class="form-group">
    <label>生年月日</label>
    <div class="date-row">
      <input type="text" id="inp-year" placeholder="1990" maxlength="4" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)">
      <input type="text" id="inp-month" placeholder="月" maxlength="2" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,2)">
      <input type="text" id="inp-day" placeholder="日" maxlength="2" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,2)">
    </div>
  </div>
  <div class="form-group">
    <label>出生時刻 <span class="optional-label">任意（アセンダント計算に使用）</span></label>
    <div class="time-row">
      <input type="text" id="inp-hour" placeholder="時（0〜23）" maxlength="2" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,2)">
      <input type="text" id="inp-min" placeholder="分（0〜59）" maxlength="2" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,2)">
    </div>
  </div>
  <div class="form-group" id="place-group">
    <label>出生地 <span class="optional-label">アセンダント計算に使用</span></label>
    <div id="place-presets" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
    <div class="date-row">
      <input type="text" id="inp-lat" placeholder="緯度 例:35.69" inputmode="decimal">
      <input type="text" id="inp-lng" placeholder="経度 例:139.69" inputmode="decimal">
    </div>
  </div>
  <button class="calc-btn" onclick="calculate()">統 合 鑑 定 す る</button>
</div>

<!-- 結果タブ -->
<div class="container" id="tab-result" style="display:none">
  <div id="result-content"></div>
</div>


<script>
// ==================== dragon.html READINGS ====================
var READINGS={"牡羊座":{"牡羊座":{"title":"炎の一点突破","flower":"赤い野バラ","reading":"天と地がともに炎の開拓者。あなたの内なる炎は器をも焼き尽くし、ただまっすぐに前へ進む。誰も踏み入れぬ荒野に最初の足跡を刻むのがあなたの使命。迷いは不要、行動こそが祈りである。","gift":"誰も躊躇う瞬間に最初に動ける胆力","shadow":"慎重さを持てば失敗しないという思い込み","mantra":"我は炎、道を拓く"},"牡牛座":{"title":"大地に宿る火種","flower":"ひまわり","reading":"燃える種が豊かな大地の器に落ちた。あなたは焦らず、しかし確実に根を張りながら咲く。外見は穏やかで堅実に見えるが、内側には誰も消せない情熱の火がある。その火が実りをつくる。","gift":"情熱を持続的なカタチに変える力","shadow":"安定を得てから動くべきという思い込み","mantra":"静かな火が山を動かす"},"双子座":{"title":"風に乗る火の粉","flower":"コスモス","reading":"開拓の炎が言葉と知の器に宿った。あなたのアイデアは火花のように飛び散り、周囲に着火させる。好奇心の赴くまま動くその姿が、実は新しい時代の道標となっている。","gift":"ひらめきを言葉にして人を動かす力","shadow":"一つに絞らなければいけないという思い込み","mantra":"言葉は炎、世界を灯す"},"蟹座":{"title":"守り火の番人","flower":"赤いカーネーション","reading":"炎の種が深い慈愛の器に包まれた。あなたは愛する人を守るとき、誰よりも勇敢になる。外には繊細に見えるが、大切なものへの情熱は誰にも消せない。家族と仲間があなたの戦場だ。","gift":"愛するものを命がけで守り抜く強さ","shadow":"強くあることと優しくあることは矛盾するという思い込み","mantra":"愛が最強の炎"},"獅子座":{"title":"王冠の炎","flower":"赤いバラ","reading":"開拓者の魂が誇り高き王の器に宿った。あなたが舞台に立つとき、場の空気が変わる。内なる炎と外の輝きが重なり合い、人々を鼓舞する存在となる。その光を隠す必要はない。","gift":"存在そのものでステージを創る力","shadow":"目立つことは傲慢だという思い込み","mantra":"我が炎で世を照らせ"},"乙女座":{"title":"精錬される火","flower":"赤いコスモス","reading":"炎の種が緻密な職人の器に落ちた。あなたの情熱は細部に宿る。大きなビジョンを持ちながら、一つひとつを丁寧に仕上げていく。その完璧主義の奥に、世界を変える炎がある。","gift":"情熱を精密な技術へと昇華させる力","shadow":"完璧でなければ動いてはいけないという思い込み","mantra":"炎は細部に宿る"},"天秤座":{"title":"和解の炎","flower":"赤いチューリップ","reading":"開拓の炎が美と調和の器に宿った。あなたは争いを避けながらも、内側では常に正義への情熱が燃えている。その炎が人々の間に橋をかけ、新しい関係性を切り拓く。","gift":"情熱を対話と美に変換する力","shadow":"主張することは関係を壊すという思い込み","mantra":"炎は橋となる"},"蠍座":{"title":"深淵の業火","flower":"深紅のバラ","reading":"炎の種が深海の器に沈んだ。表には見えぬが、その熱は核心まで届く。あなたの情熱は表面的な華やかさではなく、魂の奥深くで相手を変容させる力を持つ。","gift":"魂の深部に触れ人を根本から変える力","shadow":"信じた相手に裏切られることへの恐怖","mantra":"深き炎が真実を照らす"},"射手座":{"title":"地平線の炎","flower":"オレンジのデイジー","reading":"開拓者の炎が自由の弓手の器に宿った。あなたは地平線の向こうへ向かって矢を放ち続ける。その情熱は国境も常識も越えて、まだ見ぬ世界へと人々を誘う。","gift":"可能性の地平を常に押し広げる力","shadow":"自由と責任は相反するという思い込み","mantra":"炎よ、星まで届け"},"山羊座":{"title":"頂を目指す炎","flower":"エーデルワイス","reading":"炎の種が忍耐の登山家の器に宿った。あなたの情熱は派手には燃えない。しかし長い時間をかけて、確実に頂を目指す。その炎は雪山の中でも消えることがない。","gift":"情熱を長期的な達成へと転化する力","shadow":"苦労なき成功は本物ではないという思い込み","mantra":"炎は山頂で輝く"},"水瓶座":{"title":"革命の炎","flower":"青いアネモネ","reading":"開拓の炎が革命家の器に宿った。あなたは既存の枠組みを壊し、まだ誰も見たことのない未来を切り拓く。その情熱は個人の欲望ではなく、人類全体への贈り物だ。","gift":"時代を先取りして新しい世界を創る力","shadow":"理解されることを待つ必要があるという思い込み","mantra":"炎は未来を燃やす"},"魚座":{"title":"聖なる炎","flower":"赤い睡蓮","reading":"炎の種が深い海の夢想家の器に宿った。あなたの情熱は見えない世界へと向かう。現実と幻想の境界で炎を灯し、人々に見えない真実を照らして見せる。","gift":"霊的な炎で人の魂に光を灯す力","shadow":"現実的でなければ認められないという思い込み","mantra":"炎は夢の中で永遠に燃える"}},"牡牛座":{"牡羊座":{"title":"大地を駆ける種","flower":"向日葵","reading":"豊かさの種が開拓者の器に落ちた。外見は行動的で真っ先に動くが、内側には揺るぎない美意識と価値観がある。衝動的に見えて実は深く吟味している。その直感は大地の声だ。","gift":"行動力と審美眼を同時に持つ力","shadow":"立ち止まることは負けだという思い込み","mantra":"大地よ、今ここで咲け"},"牡牛座":{"title":"豊穣の双つ","flower":"牡丹","reading":"天も地も豊かさの星。あなたは五感で世界を受け取り、美しいものを生み出す天才だ。焦る必要はない。季節が巡るように、あなたの花は必ず満開になる。","gift":"美と豊かさを現実に結晶させる力","shadow":"もっと準備が整ってから始めるべきという思い込み","mantra":"私は大地、必ず実る"},"双子座":{"title":"語る大地","flower":"ミモザ","reading":"豊かさの種が言葉の器に宿った。あなたは美しいものや価値あるものを、言葉で伝える才能がある。五感で感じた豊かさを物語にして、多くの人の心に種を蒔く。","gift":"感覚的な豊かさを言葉で伝播させる力","shadow":"知識が十分でなければ語れないという思い込み","mantra":"言葉が大地を豊かにする"},"蟹座":{"title":"守られた実り","flower":"白いバラ","reading":"豊かさの種が慈愛の器に包まれた。あなたは家族や大切な人に豊かさをもたらすことに喜びを感じる。その愛情は食卓の温もりであり、魂の安らぎとなって人々に届く。","gift":"愛する人の心と体を満たす力","shadow":"自分が満たされる前に与え続けなければという思い込み","mantra":"与えることが豊かさの源"},"獅子座":{"title":"黄金の王国","flower":"黄金のユリ","reading":"豊穣の種が王の器に宿った。あなたは美と豊かさを舞台に乗せる。その存在が場を豊かにし、人々に「もっと良い人生がある」と気づかせる。豊かさを恥じず、堂々と纏え。","gift":"豊かさと美を体現して人を鼓舞する力","shadow":"贅沢を望むことは浅ましいという思い込み","mantra":"豊かさは輝く権利だ"},"乙女座":{"title":"丁寧な収穫","flower":"ラベンダー","reading":"豊かさの種が緻密な職人の器に落ちた。あなたは細部まで丁寧に整えることで本物の豊かさを生み出す。質を妥協しない姿勢が、長く愛されるものを世に残す。","gift":"本物の質を見極め形にする職人の力","shadow":"完全でないものは世に出す価値がないという思い込み","mantra":"丁寧さが豊かさを生む"},"天秤座":{"title":"美の調停者","flower":"ピンクのバラ","reading":"豊かさと美の種が調和の器に宿った。あなたは美しいものを選び、人々の間に心地よい空間を作り出す。その審美眼が関係を豊かにし、争いを優雅に溶かす。","gift":"美と調和で人の心を豊かにする力","shadow":"波風を立てずに全員を満足させられるという思い込み","mantra":"美が世界を整える"},"蠍座":{"title":"地底の宝","flower":"黒いチューリップ","reading":"豊かさの種が深淵の器に沈んだ。あなたの豊かさは表面には現れない。深く潜るほど価値あるものを見つける嗅覚がある。人が見落とすものの中に、真の財を見出す。","gift":"隠れた価値を掘り起こし変容させる力","shadow":"豊かさを人に見せると奪われるという思い込み","mantra":"深みにこそ宝がある"},"射手座":{"title":"旅する豊穣","flower":"オレンジのマリーゴールド","reading":"豊かさの種が自由の器に宿った。あなたは旅と探求の中で豊かさを発見する。一か所に留まらず、世界中から美と実りを集めて帰ってくる。その体験が人生の財産だ。","gift":"世界を旅して豊かさを持ち帰る力","shadow":"定住することが豊かさへの近道という思い込み","mantra":"旅の先に実りがある"},"山羊座":{"title":"山の実り","flower":"白いエーデルワイス","reading":"豊かさの種が忍耐の器に落ちた。あなたは時間をかけて着実に豊かさを積み上げる。焦らず、腐らず、地道に積み重ねたものが、やがて誰も真似できない財産となる。","gift":"長期的視点で本物の豊かさを築く力","shadow":"楽に豊かになることは許されないという思い込み","mantra":"時が実りを育てる"},"水瓶座":{"title":"未来の豊穣","flower":"青いデルフィニウム","reading":"豊かさの種が革新の器に宿った。あなたは新しい形の豊かさを人類にもたらす。物質だけではなく、アイデアや繋がりの中に真の実りを見出し、未来へと手渡す。","gift":"新時代の豊かさの概念を創造する力","shadow":"豊かさとは物質的なものだという思い込み","mantra":"未来が豊かさを定義する"},"魚座":{"title":"夢の実り","flower":"水仙","reading":"豊かさの種が夢想の器に落ちた。あなたは目に見えない豊かさを感じ取る。音楽、詩、祈り、夢——そういった形なきものの中に、魂を満たす真の実りを見出す。","gift":"魂の豊かさを感受し他者に分かち合う力","shadow":"形にならないものには価値がないという思い込み","mantra":"夢が最も豊かな実り"}},"双子座":{"牡羊座":{"title":"疾風の言葉","flower":"タンポポ","reading":"知と言葉の種が開拓者の器に宿った。あなたは思いついたそばから言葉にして世界へ放つ。その言葉は風のように速く、炎のように人々の心に火をつける。考えるより先に語れ。","gift":"瞬時にアイデアを言葉にして場を動かす力","shadow":"考えを整理してから話さなければという思い込み","mantra":"言葉が道を切り拓く"},"牡牛座":{"title":"根付く言葉","flower":"スズラン","reading":"風の種が大地の器に落ちた。あなたの言葉は軽やかでありながら、不思議と人の心に深く根を張る。知識を現実の価値へと変換する稀な才能を持つ。","gift":"知識を具体的な価値と豊かさに変える力","shadow":"一つのことを極めなければ信用されないという思い込み","mantra":"言葉が大地に根を張る"},"双子座":{"title":"無限の風","flower":"コスモス","reading":"天も地も風と言葉の星。あなたの好奇心に終わりはなく、世界はいつも新しい発見に満ちている。その軽やかさが最大の才能。どこにいても風を起こせる。","gift":"無限の好奇心で世界を面白くする力","shadow":"一つのことに集中しなければ成功できないという思い込み","mantra":"風は自由に吹く"},"蟹座":{"title":"家族への詩","flower":"白いコスモス","reading":"言葉の種が慈愛の器に宿った。あなたは愛する人への言葉を誰よりも大切にする。その優しい言葉が家族や友人の心の拠り所となり、見えない絆を紡いでいく。","gift":"愛を言葉にして人の心を安らかにする力","shadow":"感情を言葉にすると重くなるという思い込み","mantra":"優しい言葉が絆を作る"},"獅子座":{"title":"舞台の語り手","flower":"黄色いガーベラ","reading":"言葉の種が表現者の器に宿った。あなたは舞台の上で言葉を武器に人々を魅了する。ユーモアと知性が合わさり、その場を一瞬で変える力がある。","gift":"言葉と表現で人を魅了し舞台を作る力","shadow":"知的すぎると面白くないという思い込み","mantra":"言葉が舞台を照らす"},"乙女座":{"title":"精密な言語","flower":"白いデイジー","reading":"言葉の種が職人の器に落ちた。あなたは言葉を精密に操る。曖昧を許さず、正確に伝えることへのこだわりが、信頼される文章と言葉を生み出す。","gift":"言葉を精密に操り本質を伝える力","shadow":"すべてを説明し尽くさなければ伝わらないという思い込み","mantra":"正確な言葉が真実を映す"},"天秤座":{"title":"対話の風","flower":"藤","reading":"言葉の種が調和の器に宿った。あなたは対話の天才だ。どんな立場の人とも言葉を交わし、その間に橋をかける。あなたの会話が争いを溶かし、新しい可能性を生む。","gift":"対話で人と人の間に橋をかける力","shadow":"全員が納得する言葉など存在しないという思い込み","mantra":"言葉が橋となる"},"蠍座":{"title":"深淵の言葉","flower":"紫のアイリス","reading":"言葉の種が深海の器に沈んだ。あなたの言葉は表面的な情報ではなく、魂の核心を突く。人が言語化できない感情を言葉にし、静かに相手の内側を変容させる。","gift":"言葉で魂の深部に触れ変容を促す力","shadow":"深く知ることは傷つくことだという思い込み","mantra":"深い言葉が魂を動かす"},"射手座":{"title":"地平線の言葉","flower":"黄色いチューリップ","reading":"言葉の種が自由の器に宿った。あなたの言葉は国境も常識も越えて飛んでいく。哲学と物語が合わさり、まだ見ぬ真実へと人々を誘う。","gift":"言葉で人の視野を宇宙規模に広げる力","shadow":"真実は一つだという思い込み","mantra":"言葉は地平線を越える"},"山羊座":{"title":"刻まれる言葉","flower":"白いカーネーション","reading":"言葉の種が忍耐の器に落ちた。あなたの言葉は時間をかけて磨かれ、石に刻まれるように人の記憶に残る。軽やかな知性と地道な積み重ねが、歴史に残る言葉を生む。","gift":"時を超えて残る言葉を紡ぐ力","shadow":"すぐに結果が出なければ意味がないという思い込み","mantra":"言葉は時を超える"},"水瓶座":{"title":"革命の言葉","flower":"青いヤグルマギク","reading":"言葉の種が革新の器に宿った。あなたの言葉は時代を先取りし、まだ存在しない概念を言語化する。その言葉が種となり、未来の革命を静かに準備する。","gift":"時代を変える概念を最初に言語化する力","shadow":"理解されない言葉に価値はないという思い込み","mantra":"言葉が未来を創る"},"魚座":{"title":"夢の言葉","flower":"青いアネモネ","reading":"言葉の種が夢の器に落ちた。あなたは見えない世界を言葉にする詩人だ。論理を超えた言語が、人の無意識に届き、魂の深いところを癒し、目覚めさせる。","gift":"見えない世界を言葉で現実に橋渡しする力","shadow":"論理的でない言葉は信用されないという思い込み","mantra":"夢の言葉が魂に届く"}},"蟹座":{"牡羊座":{"title":"守護の炎","flower":"赤いカーネーション","reading":"慈愛の種が開拓者の器に宿った。あなたは愛する人を守るために誰よりも勇敢に動く。外には果敢な戦士に見えるが、その行動のすべては深い愛情から生まれている。","gift":"愛する者のために誰より勇敢に動ける力","shadow":"強くなければ守れないという思い込み","mantra":"愛が最強の盾となる"},"牡牛座":{"title":"大地の母","flower":"白い牡丹","reading":"慈愛の種が豊かな大地の器に落ちた。あなたは人々の心と体を同時に満たす。温かい食事、安らぎの場所、心地よい空間——その手から生まれるすべてが愛の形だ。","gift":"人の心と体を同時に癒し満たす力","shadow":"自分を後回しにして与えることが愛だという思い込み","mantra":"満たされた大地が人を育む"},"双子座":{"title":"言葉の揺りかご","flower":"白いコスモス","reading":"慈愛の種が言葉の器に宿った。あなたの言葉は人の心を包み込む。情報を伝えるのではなく、感情を受け取り、優しい言葉で包んで返す。その言葉が傷を癒す。","gift":"言葉で人の感情を受け取り癒す力","shadow":"論理的でなければ言葉に価値がないという思い込み","mantra":"優しい言葉が心を包む"},"蟹座":{"title":"深海の愛","flower":"白い睡蓮","reading":"天も地も慈愛の水。あなたの感受性は他の誰とも比べられないほど深い。その深さゆえに傷つくこともあるが、同じ深さで人を愛し、癒すことができる。","gift":"深い共感で人の魂に触れる力","shadow":"感じすぎることは弱さだという思い込み","mantra":"深い愛は深い海のように"},"獅子座":{"title":"愛の女王","flower":"ピンクのバラ","reading":"慈愛の種が王の器に宿った。あなたは愛情を豊かに表現し、人々を温かく照らす。その存在自体が人々の心の太陽となり、周囲に安心と喜びをもたらす。","gift":"愛を堂々と表現して人の心を照らす力","shadow":"愛情表現は重いと思われるという思い込み","mantra":"愛を輝かせよ"},"乙女座":{"title":"細やかな愛","flower":"白いスミレ","reading":"慈愛の種が緻密な職人の器に落ちた。あなたの愛は細部に宿る。気づかれないような小さな気遣いの積み重ねが、人の心に深く刻まれる本物の愛となる。","gift":"細やかな気遣いで人の心を深く支える力","shadow":"完璧なケアができなければ愛とは言えないという思い込み","mantra":"細やかさが愛の証"},"天秤座":{"title":"調和の愛","flower":"ピンクのスイートピー","reading":"慈愛の種が調和の器に宿った。あなたは人と人の間の感情の橋渡し役だ。誰かが傷ついているとき、その痛みを感じ取り、バランスを取り戻す優しさを持つ。","gift":"感情を感じ取り人間関係を調和させる力","shadow":"全員の感情を引き受けなければならないという思い込み","mantra":"愛が調和を生む"},"蠍座":{"title":"魂の絆","flower":"深紅のバラ","reading":"慈愛の種が深淵の器に沈んだ。あなたの愛は表面ではなく、魂の奥深くで結ばれる。一度心を許した相手とは永遠の絆を結び、その深い愛が相手を変容させる。","gift":"魂の深部で結ばれる変容的な愛の力","shadow":"愛した分だけ傷つくという思い込み","mantra":"深き愛は魂を変える"},"射手座":{"title":"世界への愛","flower":"オレンジのガーベラ","reading":"慈愛の種が自由の器に宿った。あなたの愛は家族だけに留まらず、世界全体へと広がる。旅と探求の中で出会う人々を愛し、その愛が地球を少し温かくする。","gift":"出会うすべての人を愛し世界を温かくする力","shadow":"深く愛すると自由を失うという思い込み","mantra":"愛は世界を旅する"},"山羊座":{"title":"永遠の愛","flower":"白いカスミソウ","reading":"慈愛の種が忍耐の器に落ちた。あなたの愛は派手には見えないが、長い時間をかけて積み上げられる。約束を守り続け、傍に居続けることが、あなたの愛の言語だ。","gift":"時間をかけて積み上げる永続する愛の力","shadow":"感情を見せることは弱さだという思い込み","mantra":"愛は時間とともに深まる"},"水瓶座":{"title":"人類への愛","flower":"青いデルフィニウム","reading":"慈愛の種が革新の器に宿った。あなたの愛は個人を超えて人類全体へと向かう。社会の痛みを感じ取り、それを変えようとする行動がすべて愛から発している。","gift":"個を超えた人類への愛を行動に変える力","shadow":"感情的になることは客観性を失うという思い込み","mantra":"愛が社会を変える"},"魚座":{"title":"宇宙の愛","flower":"紫の睡蓮","reading":"慈愛の種が夢の器に落ちた。あなたの愛は境界を持たない。人間だけでなく、生き物すべて、見えない存在までを包み込む宇宙的な慈愛があなたの本質だ。","gift":"すべての存在を包む宇宙的な慈愛の力","shadow":"境界を持たないと自分が消えるという思い込み","mantra":"愛に境界はない"}},"獅子座":{"牡羊座":{"title":"太陽の先駆者","flower":"向日葵","reading":"輝きの種が開拓者の器に宿った。あなたは誰よりも先に舞台に立ち、その輝きで道を照らす。自己表現と行動力が合わさり、あなたの存在自体が革命の狼煙となる。","gift":"自らの輝きで新しい時代の扉を開く力","shadow":"認められなければ輝く意味がないという思い込み","mantra":"我が輝きが道を作る"},"牡牛座":{"title":"黄金の芸術家","flower":"黄金のバラ","reading":"輝きの種が豊かな大地の器に落ちた。あなたは美しいものを作り出す芸術家だ。その表現は一時的な华やかさではなく、時代を超えて人の心に残る本物の輝きを放つ。","gift":"永続する美と輝きを創造する力","shadow":"華やかさと品格は両立しないという思い込み","mantra":"美が永遠に輝く"},"双子座":{"title":"光の語り手","flower":"黄色いコスモス","reading":"輝きの種が言葉の器に宿った。あなたは話すだけで場が明るくなる。知性とエンターテイメントが合わさり、人々を笑わせ、感動させ、気づかせる。その言葉は太陽だ。","gift":"言葉と表現で人の心を明るく照らす力","shadow":"深刻でなければ重要でないという思い込み","mantra":"言葉よ、太陽のように輝け"},"蟹座":{"title":"家族の太陽","flower":"ひまわり","reading":"輝きの種が慈愛の器に宿った。あなたは家族や大切な人たちにとっての太陽だ。その温かい輝きが人々に安心と勇気を与え、傍にいるだけで心が明るくなる。","gift":"愛する人の心を照らし勇気を与える力","shadow":"自分が輝くと周囲が嫉妬するという思い込み","mantra":"愛する人の太陽となれ"},"獅子座":{"title":"真の王","flower":"赤いバラ","reading":"天も地も輝きの星。あなたは生まれながらの王だ。その輝きは努力で作るものではなく、ただ在るだけで放たれる。王は王冠を求めない。王が立てば王冠が来る。","gift":"在るだけで場を支配する王者の輝き","shadow":"もっと認められなければ本物の王ではないという思い込み","mantra":"我は王、既に輝いている"},"乙女座":{"title":"完璧な光","flower":"白いダリア","reading":"輝きの種が職人の器に落ちた。あなたの表現は緻密で完璧だ。細部まで磨き上げられた輝きは、見る人の目を奪い、長く記憶に残る。完璧さが最大の輝きとなる。","gift":"細部まで磨き上げて完璧な輝きを放つ力","shadow":"完璧でなければ人前に出てはいけないという思い込み","mantra":"磨かれた光は永遠に輝く"},"天秤座":{"title":"美の主役","flower":"ピンクのダリア","reading":"輝きの種が調和の器に宿った。あなたは美しい場と関係性の中心に立つ。その優雅な輝きが周囲を引き立て、すべてを調和させる。美の中心にいることがあなたの天命だ。","gift":"美と調和の中心で場全体を輝かせる力","shadow":"目立つことで人を傷つけるという思い込み","mantra":"美の中心で輝け"},"蠍座":{"title":"深淵の光","flower":"深紅のダリア","reading":"輝きの種が深淵の器に沈んだ。あなたの輝きは表面的な华やかさではなく、魂の深部から放たれる。その光は暗闇の中でこそ最も眩しく、人の魂に直接届く。","gift":"暗闇の中で最も輝く魂の光を放つ力","shadow":"輝けば傷つくという思い込み","mantra":"深き光が闇を照らす"},"射手座":{"title":"冒険する太陽","flower":"オレンジのヒマワリ","reading":"輝きの種が自由の器に宿った。あなたは旅の中で輝く。新しい場所、新しい人々、新しい思想——そのすべてがあなたの輝きを増す燃料となる。世界があなたの舞台だ。","gift":"世界を舞台に自由に輝き続ける力","shadow":"一か所に留まることで輝きが増すという思い込み","mantra":"太陽は旅をして輝く"},"山羊座":{"title":"不滅の光","flower":"白いユリ","reading":"輝きの種が忍耐の器に落ちた。あなたの輝きは一夜限りの华火ではない。長い時間をかけて磨かれ、積み上げられた実績の上に立つ輝きは、永遠に消えない。","gift":"時間と努力で磨かれた不滅の輝きを放つ力","shadow":"若いうちに輝けなければ遅すぎるという思い込み","mantra":"時が輝きを不滅にする"},"水瓶座":{"title":"未来の光","flower":"青いヒヤシンス","reading":"輝きの種が革新の器に宿った。あなたの輝きは現在ではなく未来を照らす。時代の先を行くその光が、まだ見ぬ世界への道を照らし、人々を引っ張っていく。","gift":"未来を照らし人類を先導する光を放つ力","shadow":"今理解されなければ輝いていないという思い込み","mantra":"未来に向けて輝け"},"魚座":{"title":"神聖な光","flower":"白い睡蓮","reading":"輝きの種が夢の器に落ちた。あなたの輝きは現実世界だけでなく、見えない領域をも照らす。その神聖な光が人々の魂を目覚めさせ、夢と現実の境界を溶かす。","gift":"見えない世界をも照らす神聖な光を放つ力","shadow":"現実的でなければ輝きに意味がないという思い込み","mantra":"神聖な光が魂を照らす"}},"乙女座":{"牡羊座":{"title":"精密な開拓者","flower":"白いコスモス","reading":"緻密な種が開拓者の器に宿った。あなたは直感で動きながら、細部を見落とさない。行動の速さと分析の鋭さが合わさり、誰も気づかぬ問題を先に解決してしまう。","gift":"素早く動きながら細部を完璧に整える力","shadow":"完璧な計画なしに動いてはいけないという思い込み","mantra":"精密さが道を拓く"},"牡牛座":{"title":"職人の大地","flower":"白いバラ","reading":"緻密な種が豊かな大地の器に落ちた。あなたは本物だけを選び、丁寧に育てる。質への妥協を知らないその姿勢が、長く愛される作品と関係性を生み出す。","gift":"本物を見極め丁寧に育てる職人の力","shadow":"完全なものだけに価値があるという思い込み","mantra":"丁寧さが本物を生む"},"双子座":{"title":"分析の言葉","flower":"白いデイジー","reading":"緻密な種が言葉の器に宿った。あなたは複雑な情報を整理し、誰にでもわかる言葉に変える天才だ。その明快な言葉が人々の混乱を解き、道筋を示す。","gift":"複雑な情報を明快な言葉に変換する力","shadow":"すべてを説明しなければ伝わらないという思い込み","mantra":"明快な言葉が霧を晴らす"},"蟹座":{"title":"細やかな愛","flower":"白いスミレ","reading":"緻密な種が慈愛の器に宿った。あなたの愛は言葉より行動に現れる。相手が言わなかったことに気づき、求める前に手を差し伸べる。その細やかさが本物の愛だ。","gift":"言葉より行動で細やかに人を支える力","shadow":"完璧にケアできなければ愛していないという思い込み","mantra":"細やかな行動が愛を示す"},"獅子座":{"title":"完璧な舞台","flower":"白いダリア","reading":"緻密な種が輝きの器に宿った。あなたは舞台の裏側まで完璧に整えてから表舞台に立つ。その徹底した準備が本物の輝きを生み、見る者を圧倒する。","gift":"完璧な準備で圧倒的な輝きを放つ力","shadow":"準備が整うまで舞台に立てないという思い込み","mantra":"完璧な準備が輝きを生む"},"乙女座":{"title":"純粋な職人","flower":"白いカモミール","reading":"天も地も緻密さの星。あなたの完璧主義は天と地から与えられた使命だ。細部への敬意が、他の誰も到達できないレベルの作品を生み出す。","gift":"天と地から授かった究極の緻密さ","shadow":"完璧でない自分は価値がないという思い込み","mantra":"細部に神が宿る"},"天秤座":{"title":"美の調律師","flower":"白いスイートピー","reading":"緻密な種が調和の器に宿った。あなたは美しいバランスを精密に整える。関係性のわずかなズレを感知し、さりげなく修正するその技術が、場全体を完璧に整える。","gift":"精密な感覚で美と調和を完璧に整える力","shadow":"完璧なバランスなど存在しないという思い込み","mantra":"精密さが調和を生む"},"蠍座":{"title":"深層の分析家","flower":"白いアイリス","reading":"緻密な種が深淵の器に沈んだ。あなたは表面ではなく、構造の核心を見る。人が見えないものを分析し、問題の根本原因を正確に特定する。その洞察は鋭利な刃だ。","gift":"物事の核心を精密に分析し根本を変える力","shadow":"真実を知ることは傷つくことだという思い込み","mantra":"精密な眼が真実を見る"},"射手座":{"title":"旅する職人","flower":"白いコスモス","reading":"緻密な種が自由の器に宿った。あなたは世界を旅しながら、どこでも細部を見落とさない。広大なビジョンと精密な実行力が合わさり、スケールの大きな作品を生む。","gift":"広大なビジョンを精密に実現する力","shadow":"細かいことを気にすると自由を失うという思い込み","mantra":"精密さが大きな夢を実現する"},"山羊座":{"title":"不変の精度","flower":"白いカーネーション","reading":"緻密な種が忍耐の器に落ちた。あなたは長い時間をかけて技術を磨く。その精度は年々上がり続け、誰も追いつけない領域へと到達する。時間が最大の武器だ。","gift":"時間をかけて誰も到達できない精度に達する力","shadow":"早く完成させなければ価値がないという思い込み","mantra":"時が精度を極限まで高める"},"水瓶座":{"title":"システムの革新者","flower":"白い矢車菊","reading":"緻密な種が革新の器に宿った。あなたは既存のシステムの欠陥を正確に分析し、より完璧な仕組みを設計する。その精密な革新が社会全体を改善する。","gift":"システムを精密に分析し完璧な革新を起こす力","shadow":"細かすぎて全体が見えなくなるという思い込み","mantra":"精密な革新が世界を変える"},"魚座":{"title":"見えない秩序","flower":"白い睡蓮","reading":"緻密な種が夢の器に落ちた。あなたは混沌の中に隠れた秩序を見出す。直感と分析が融合し、言葉にできない真実を形にする。見えない世界に精密さをもたらす。","gift":"混沌から隠れた秩序と美を見出す力","shadow":"論理と直感は相反するという思い込み","mantra":"混沌の中に完璧な秩序がある"}},"天秤座":{"牡羊座":{"title":"正義の剣","flower":"ラベンダー","reading":"調和の種が開拓者の器に宿った。あなたは不公正を見ると黙っていられない。美しい世界への情熱が行動力と合わさり、誰も踏み込まなかった場所に正義の旗を立てる。","gift":"美と正義のために真っ先に行動できる力","shadow":"争いを避けながら正義を実現できるという思い込み","mantra":"正義のために剣を抜け"},"牡牛座":{"title":"美の庭園","flower":"ピンクのバラ","reading":"調和の種が豊かな大地の器に落ちた。あなたは美しい空間と豊かな関係性を同時に育てる。その審美眼と粘り強さが、誰もが訪れたくなる場所と関係性を作り出す。","gift":"美しい空間と豊かな人間関係を同時に育てる力","shadow":"美しさと実用性は両立しないという思い込み","mantra":"美が豊かさを育む"},"双子座":{"title":"対話の芸術家","flower":"藤","reading":"調和の種が言葉の器に宿った。あなたは対話そのものを芸術にする。どんな意見も美しく整理し、異なる立場の人々を笑顔で繋ぐ。言葉が平和を生み出す。","gift":"対話を芸術に変え人々を繋ぐ力","shadow":"全員が同意する結論がなければ失敗だという思い込み","mantra":"言葉が平和を織りなす"},"蟹座":{"title":"関係の守護者","flower":"ピンクのスイートピー","reading":"調和の種が慈愛の器に宿った。あなたは人間関係の微妙なバランスを感じ取り、壊れかけた絆を優しく修復する。その調停力が、コミュニティに平和をもたらす。","gift":"壊れかけた絆を優しく修復する力","shadow":"関係を保つためには自分を犠牲にすべきという思い込み","mantra":"愛が調和を守る"},"獅子座":{"title":"美の女王","flower":"ピンクのダリア","reading":"調和の種が輝きの器に宿った。あなたは美の体現者として舞台に立つ。その優雅な存在感が場 function reduce(n) {
  if (n === 11 || n === 22 || n === 33) return n;
  while (n > 9) {
    n = String(n).split('').reduce((a,c) => a + parseInt(c), 0);
    if (n === 11 || n === 22 || n === 33) return n;
  }
  return n;
}

function calcNumerology(kana, y, m, d) {
  const yr = parseInt(y), mo = parseInt(m), da = parseInt(d);
  const lifeRaw = [...String(yr),...String(mo),...String(da)].map(Number).reduce((a,b)=>a+b,0);
  const life = reduce(lifeRaw);
  const destiny = reduce([...String(mo),...String(da)].map(Number).reduce((a,b)=>a+b,0));
  const soul = reduce([...String(da)].map(Number).reduce((a,b)=>a+b,0));
  const persona = reduce([...String(yr)].map(Number).reduce((a,b)=>a+b,0));
  let esum = 0;
  for (const c of kana) { if (GOJUON[c]) esum += GOJUON[c]; }
  const expr = reduce(esum);
  const mission = reduce(life + expr);
  return { life, lifeRaw, destiny, soul, persona, expr, mission };
}

const TONES = [
  {num:1,name:'磁気',kw:'目的・引力'},{num:2,name:'月',kw:'挑戦・安定'},
  {num:3,name:'電気',kw:'奉仕・活性化'},{num:4,name:'自己存在',kw:'定義・形式'},
  {num:5,name:'倍音',kw:'輝き・中心'},{num:6,name:'リズム',kw:'均衡・組織'},
  {num:7,name:'共鳴',kw:'感応・調整'},{num:8,name:'銀河系',kw:'調和・一体化'},
  {num:9,name:'太陽',kw:'意図・脈動'},{num:10,name:'惑星',kw:'完成・現実化'},
  {num:11,name:'スペクトル',kw:'解放・手放し'},{num:12,name:'水晶',kw:'協力・普遍化'},
  {num:13,name:'宇宙',kw:'超越・上昇'}
];
const MOFF = [0,31,59,90,120,151,181,212,243,273,304,334];
function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0;}
function ybase(y){
  let b=107;
  if(y>=1955){for(let i=1955;i<y;i++)b=(b+365)%260;}
  else{for(let i=y;i<1955;i++)b=(b-365+260)%260;}
  return b;
}
function calcKin(y,m,d){
  const k=(ybase(y)+MOFF[m-1]+d+(isLeap(y)&&m>=3?1:0))%260;
  return k===0?260:k;
}
function calcMaya(y,m,d){
  const kin = calcKin(y,m,d);
  const si=(kin-1)%20, ti=(kin-1)%13;
  const wk_raw = kin-ti; const wk = wk_raw<1?wk_raw+260:wk_raw;
  const wsi=(wk-1)%20;
  return { kin, sign: SIGNS[si], tone: TONES[ti], wave: SIGNS[wsi] };
}

  {n:'東京',lat:35.69,lng:139.69},{n:'大阪',lat:34.69,lng:135.50},
  {n:'名古屋',lat:35.18,lng:136.91},{n:'横浜',lat:35.44,lng:139.64},
  {n:'札幌',lat:43.06,lng:141.35},{n:'仙台',lat:38.27,lng:140.87},
  {n:'広島',lat:34.39,lng:132.46},{n:'福岡',lat:33.59,lng:130.40},
  {n:'那覇',lat:26.21,lng:127.68},{n:'京都',lat:35.01,lng:135.77}
];
function toAstroSign(lon){
  return ASTRO_SIGNS[Math.floor(((lon%360)+360)%360/30)];
}
function calcAstro(year,month,day,hour,min,lat,lng){
  const utcDate = new Date(Date.UTC(year,month-1,day,hour-9,min,0));
  const JD = utcDate.getTime()/86400000+2440587.5;
  const T = (JD-2451545.0)/36525;
  const L0 = ((280.46646+36000.76983*T)%360+360)%360;
  const M = (357.52911+35999.05029*T-0.0001537*T*T)*Math.PI/180;
  const C = (1.914602-0.004817*T-0.000014*T*T)*Math.sin(M)
           +(0.019993-0.000101*T)*Math.sin(2*M)
           +0.000289*Math.sin(3*M);
  const sunLon = ((L0+C)%360+360)%360;
  const helioLon = (sunLon+180)%360;
  const GMST = ((280.46061837+360.98564736629*(JD-2451545.0))%360+360)%360;
  const LST = ((GMST+lng)%360+360)%360;
  const eps = (23.439291111-0.013004167*T)*Math.PI/180;
  const LSTR = LST*Math.PI/180;
  const latR = lat*Math.PI/180;
  const ascRad = Math.atan2(Math.cos(LSTR),-(Math.sin(LSTR)*Math.cos(eps)+Math.tan(latR)*Math.sin(eps)));
  const asc = ((ascRad*180/Math.PI)%360+360)%360;
  return{
    geo: toAstroSign(sunLon),
    helio: toAstroSign(helioLon),
    asc: toAstroSign(asc)
  };
}
