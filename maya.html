<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マヤ暦占い</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;background:#f7f3ed;color:#2c2416;min-height:100vh}
.wrap{max-width:660px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.header{text-align:center;padding:2.5rem 1rem 2rem;border-bottom:1px solid #d8cfc4;margin-bottom:1.5rem}
.header h1{font-size:26px;font-weight:400;letter-spacing:0.18em;margin-bottom:10px}
.header p{font-size:13px;color:#8a7a68;line-height:1.8}
.tabs-row{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.tab-btn{padding:7px 16px;border:1px solid #c8bfb4;border-radius:2px;font-size:13px;cursor:pointer;background:#f7f3ed;color:#8a7a68;font-family:inherit}
.tab-btn.active{background:#2c2416;color:#f7f3ed;border-color:#2c2416}
.tab-add{border-style:dashed}
.person-block{display:none}
.person-block.active{display:block}
.input-card{background:#fff;border:1px solid #d8cfc4;padding:1.5rem;margin-bottom:1rem}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:11px;color:#8a7a68;letter-spacing:0.1em}
.field input[type=text]{padding:9px 12px;border:1px solid #d8cfc4;font-size:15px;background:#f7f3ed;color:#2c2416;width:100%;font-family:inherit;outline:none}
.dob-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px}
.dob-row select{padding:9px 8px;border:1px solid #d8cfc4;font-size:14px;background:#f7f3ed;color:#2c2416;font-family:inherit;outline:none;width:100%;cursor:pointer}
.kantei-btn{width:100%;padding:13px;background:#2c2416;color:#f7f3ed;border:none;font-size:14px;cursor:pointer;letter-spacing:0.12em;font-family:inherit;margin-top:4px}
.kantei-btn:hover{opacity:0.82}
.kin-hero{text-align:center;padding:2.5rem 1rem 2rem;background:#fff;border:1px solid #d8cfc4;margin-bottom:1rem}
.kin-lbl{font-size:10px;color:#b0a090;letter-spacing:0.2em;margin-bottom:10px}
.kin-n{font-size:72px;font-weight:300;line-height:1}
.sign-name{font-size:20px;font-weight:400;margin-top:16px;letter-spacing:0.1em}
.sign-en{font-size:11px;color:#b0a090;margin-top:5px;letter-spacing:0.15em}
.tone-pill{margin-top:16px;display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid #d8cfc4;font-size:13px;color:#8a7a68}
.three-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.tcard{background:#fff;border:1px solid #d8cfc4;padding:1rem}
.tcard-lbl{font-size:10px;color:#b0a090;letter-spacing:0.1em;margin-bottom:6px}
.tcard-main{font-size:13px;color:#2c2416;margin-bottom:3px;line-height:1.4}
.tcard-sub{font-size:10px;color:#b0a090}
.tcard-desc{font-size:12px;color:#8a7a68;margin-top:8px;line-height:1.7}
.sec-title{font-size:10px;color:#b0a090;letter-spacing:0.18em;margin:1.5rem 0 10px;display:flex;align-items:center;gap:10px}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px;background:#d8cfc4}
.kbun{background:#fff;border:1px solid #d8cfc4;padding:1.25rem;margin-bottom:8px}
.kbun-lbl{font-size:10px;color:#b0a090;letter-spacing:0.1em;margin-bottom:8px}
.kbun p{font-size:14px;color:#4a3f32;line-height:1.9}
.related-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.rkin-card{background:#fff;border:1px solid #d8cfc4;padding:1rem}
.rkin-role{font-size:10px;color:#b0a090;letter-spacing:0.1em;margin-bottom:5px}
.rkin-sign{font-size:14px;color:#2c2416;margin-bottom:2px}
.rkin-num{font-size:11px;color:#b0a090;margin-bottom:7px}
.rkin-desc{font-size:12px;color:#8a7a68;line-height:1.65}
.compat-wrap{margin-top:2rem;padding-top:2rem;border-top:1px solid #d8cfc4;display:none}
.compat-title{font-size:14px;color:#2c2416;margin-bottom:1rem;letter-spacing:0.1em}
.cpicks{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:12px}
.cpicks select{padding:9px 12px;border:1px solid #d8cfc4;font-size:14px;background:#f7f3ed;color:#2c2416;width:100%;font-family:inherit;outline:none;cursor:pointer}
.vs{font-size:16px;color:#c8bfb4;text-align:center}
.score-box{background:#fff;border:1px solid #d8cfc4;padding:1.5rem;margin-top:1rem}
.score-big{font-size:48px;font-weight:300;line-height:1}
.score-sub{font-size:10px;color:#b0a090;margin-top:3px;margin-bottom:16px;letter-spacing:0.12em}
.bar-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.blr{display:flex;justify-content:space-between;font-size:12px;color:#8a7a68;margin-bottom:5px}
.bar{height:2px;background:#ede8e0}
.barf{height:100%;background:#2c2416}
.bar-note{font-size:11px;color:#b0a090;margin-top:5px}
.ctext{margin-top:14px;padding-top:14px;border-top:1px solid #ede8e0;font-size:13px;color:#8a7a68;line-height:1.85}
@media(max-width:500px){.three-grid{grid-template-columns:1fr}.related-grid{grid-template-columns:1fr}.kin-n{font-size:54px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>マヤ暦占い</h1>
    <p>生年月日から Kin 番号・太陽の紋章・ウェイブスペル・銀河の音を導き出します</p>
  </div>

  <!-- タブ -->
  <div class="tabs-row" id="tabsRow">
    <button class="tab-btn active" data-target="block-0">人物1</button>
    <button class="tab-btn tab-add" id="addBtn">+ 追加</button>
  </div>

  <!-- 人物ブロック（最初の1人は静的に配置） -->
  <div id="persons-wrap">
    <div class="person-block active" id="block-0">
      <div class="input-card">
        <div class="field">
          <label>名前（任意）</label>
          <input type="text" class="f-name" placeholder="例：超人">
        </div>
        <div class="field">
          <label>生年月日</label>
          <div class="dob-row">
            <select class="f-y"></select>
            <select class="f-m"></select>
            <select class="f-d"></select>
          </div>
        </div>
        <button class="kantei-btn">鑑　定　す　る</button>
      </div>
      <div class="result-area"></div>
    </div>
  </div>

  <!-- 相性 -->
  <div class="compat-wrap" id="compatWrap">
    <div class="compat-title">相性を診断する</div>
    <div class="cpicks">
      <select id="compatA"></select>
      <div class="vs">×</div>
      <select id="compatB"></select>
    </div>
    <button class="kantei-btn" id="compatBtn">相性を鑑定する</button>
    <div id="compatResult"></div>
  </div>
</div>

<script>
// ===== 占いデータ =====
var SIGNS=[
  {name:"赤い龍",en:"IMIX",kw:"愛・誕生・母性",color:"赤",nature:"ポジティブエネルギーに満ちた生命力溢れるタイプ。感性で物事を判断する直感型で天真爛漫。強い母性と保護本能を持ち、人を育てることが得意です。",talent:"新しい物事をゼロから生み出す創造力と起動力。面倒見の良さとチームをまとめる統率力。",wave:"生命誕生のウェイブ。新しいプロジェクトや関係の始まりに強い力を発揮します。",r:["あなたは宇宙の始まりのエネルギーを宿した人。新しいものを生み出す力が強く、周囲に命の息吹をもたらします。どんな状況でも「ゼロから始める」勇気があり、その行動力が道を切り開きます。人を守り育てる母性的な強さも持ち合わせており、あなたの周りに自然と人が集まってきます。","あなたの魂のテーマは「守ること」と「手放すこと」の間でバランスを取ること。深い愛情で人を包み込む力がありますが、それが時に執着となることも。","生命力あふれるあなたは奉仕することで本来の力を発揮します。","あなたは形あるものを作り出す才能を持っています。アイデアを現実に落とし込む力が強く、構造や基盤を整えることが得意です。","あなたは強烈な生命エネルギーの中心となる人。","生みの親としての才能を持つあなたは物事を整理・組織化する力に優れています。","あなたは直感と創造性のチャンネルを開いた人。インスピレーションを受け取り、それを形にする才能があります。","あなたは生命エネルギーを調和させる使命を持っています。","あなたの誕生のエネルギーは意図を現実に変換する力を持っています。","あなたは生命の可能性を現実化する人。夢を形にする力と実行力を兼ね備えアイデアを具体的な成果へと変えます。","あなたは古いものを溶かし新しいものを生み出す変革のエネルギーを持っています。","あなたは生命の知恵を広く分かち合う人。","宇宙の始まりのエネルギーを超越した存在。スピリチュアルな次元での役割が大きい人です。"]},
  {name:"白い風",en:"IK",kw:"精神・疎通・呼吸",color:"白",nature:"言葉と表現力に優れた精神性の高いタイプ。自由を愛し、風のように人々をつなぐ役割を担います。",talent:"言語能力・文章力・表現力。インスピレーションを受け取り言語化する力。",wave:"精神と言葉のウェイブ。コミュニケーションのエネルギーが流れています。",r:["あなたは言葉と精神の力を宿した人。神聖なインスピレーションを受け取り、それを周囲に伝える使命があります。人々の心にすっと届くメッセージを伝えられます。","あなたのコミュニケーションには深い課題があります。言いたいことと伝わることの乖離を学ぶことが今世のテーマ。","あなたの言葉は人を動かす力を持っています。","あなたは精神的な真実を形として定義する人。","あなたは精神のエネルギーの中心となる存在。","あなたは精神とコミュニティをつなぐ橋渡し役。","あなたは霊的なメッセージを受け取るアンテナのような存在。","あなたは精神と物質を調和させる使命を持っています。","あなたの言葉には意図を現実化する力があります。","あなたは精神的なビジョンを現実に落とし込む人。","あなたは既存の概念を解放し新しい表現を生み出す人。","あなたは知識と智恵を広く分かち合う使命を持っています。","あなたは宇宙の声を地上に届ける存在。"]},
  {name:"青い夜",en:"AKBAL",kw:"夢・豊かさ・直感",color:"青",nature:"深い内面世界を持ち、夢と現実の境界を行き来するタイプ。豊かな創造力と直感力を持ちます。",talent:"創造力・芸術的センス・深い洞察力。夢やビジョンを形にする力。",wave:"夢と豊かさのウェイブ。内面の探求から豊かさが生まれます。",r:["あなたは夢と無意識の世界に深くつながった人。眠りの中でインスピレーションを受け取る才能があります。内なる世界の豊かさを信頼することで、現実にも豊かさが流れ込んできます。","あなたの夢は深く、内なる世界と外の世界のバランスを取ることが今世のテーマ。","あなたは夢見るだけでなく現実にする行動力を持っています。","あなたは夢を形にする建築家。","あなたは夢と現実の交差点に立つ人。","あなたは夢の豊かさをコミュニティにもたらす人。","あなたは夢と現実の橋渡しをする神秘的な存在。","あなたは内なる豊かさと外の世界を統合する使命を持っています。","あなたの夢は必ず実現します。","あなたは夢を現実の成果として完成させる力を持っています。","あなたは夢の古い概念を解放し新しい豊かさを切り開く人。","あなたは夢の豊かさを皆と分かち合う人。","あなたは夢と宇宙の叡智に直接アクセスできる存在。"]},
  {name:"黄色い種",en:"KAN",kw:"開花・目覚め・可能性",color:"黄",nature:"無限の可能性を持ち、適切なタイミングで花開くタイプ。直感的にベストな時期を見極め大きく成長します。",talent:"タイミング力・成長させる力・人の可能性を見抜く眼力。",wave:"開花と目覚めのウェイブ。可能性を引き出すエネルギーが流れています。",r:["あなたは無限の可能性を秘めた種。適切なタイミングを見極める直感があり行動すべき時に迷いなく動ける人です。","あなたの種は深く根を張ろうとしています。焦らずじっくりと土台を作ることが大切です。","あなたは種を撒き育てる人。","あなたは種の成長に必要な構造を作る人。","あなたの種は太陽のように輝く可能性を秘めています。","あなたは種が育つ環境を整える人。","あなたは種のどこに水を与えるべきか直感でわかる人。","あなたは種の成長と調和を司る人。","あなたの種は強い意志で開花します。","あなたは種を完全に開花させる力を持っています。","あなたは古い種の概念を解放し進化した形で開花する人。","あなたは種の豊かさをコミュニティ全体で分かち合う人。","あなたの種は宇宙的な使命を持っています。"]},
  {name:"赤い蛇",en:"CHICCHAN",kw:"情熱・本能・生命力",color:"赤",nature:"強烈な生命エネルギーと直感力を持つタイプ。情熱的で変容を繰り返しながら成長します。",talent:"直感力・変容力・強いカリスマ性と感染力。",wave:"生命力と情熱のウェイブ。強いエネルギーで周囲を動かします。",r:["あなたは生命エネルギーの化身。強烈な本能と情熱で自分の道を切り開く力があります。脱皮するように変容を繰り返し、より高みへと昇っていく人です。","あなたの情熱は深く、そのエネルギーをコントロールすることが今世のテーマです。","あなたの情熱は奉仕の形で輝きます。","あなたは本能を構造化する力を持っています。","あなたは情熱の中心となる人。","あなたは情熱をリズムよく使いこなす人。","あなたの本能は宇宙のメッセージと深くつながっています。","あなたは情熱と調和を統合する人。","あなたの情熱には強い意志が宿っています。","あなたは情熱を現実の成果に変える人。","あなたは古い恐れや制限を解放するエネルギーを持っています。","あなたは情熱をコミュニティと分かち合う人。","あなたは生命エネルギーの究極の体現者。"]},
  {name:"白い世界の橋渡し",en:"CIMI",kw:"変容・解放・手放し",color:"白",nature:"変化と手放しを得意とするタイプ。古いものを終わらせ新しいものを始める変容の力があります。",talent:"手放す力・橋渡し力・変容をサポートする才能。",wave:"変容と解放のウェイブ。変化のエネルギーが常に流れています。",r:["あなたは変容と橋渡しの使命を持って生まれた人。古いものを手放し新しい始まりへの道を切り開く力があります。","あなたは変容と安定の間で揺れています。","あなたは橋渡しの才能を奉仕に活かす人。","あなたは変容を段階的に進める力を持っています。","あなたは変容エネルギーの中心となる人。","あなたは変容のプロセスを整理整頓する人。","あなたはあの世とこの世の橋渡しができる存在。","あなたは変容と調和を同時に実現する人。","あなたの変容には強い意図が宿っています。","あなたは変容を完成させる力を持っています。","あなたは変容の概念そのものを解放する存在。","あなたは変容の智恵をコミュニティと分かち合う人。","あなたは変容の最高峰にある存在。"]},

// ===== 計算 =====
var MOFF=[0,31,59,90,120,151,181,212,243,273,304,334];
function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0;}
function ybase(y){
  var b=107;
  if(y>=1955){for(var i=1955;i<y;i++)b=(b+365)%260;}
  else{for(var i=y;i<1955;i++)b=(b-365+260)%260;}
  return b;
}
function calcKin(y,m,d){
  var k=(ybase(y)+MOFF[m-1]+d+(isLeap(y)&&m===3?1:0))%260;
  return k===0?260:k;
}
function kinInfo(kin){
  var si=(kin-1)%20,ti=(kin-1)%13;
  return{si:si,ti:ti,sign:SIGNS[si],tone:TONES[ti]};
}
var CG={"赤":[0,4,8,12,16],"白":[1,5,9,13,17],"青":[2,6,10,14,18],"黄":[3,7,11,15,19]};
function fkin(si,ti){for(var k=1;k<=260;k++)if((k-1)%20===si&&(k-1)%13===ti)return k;return 0;}
function related(kin,si,ti){
  var arr=CG[SIGNS[si].color],pos=arr.indexOf(si),gsi=arr[(pos+ti)%5];
  var osi=(si+10)%20,mk=261-kin,msi=(mk-1)%20;
  var asi=si%2===0?si+1:si-1,abk=((kin+130-1)%260)+1,absi=(abk-1)%20;
  return{
    guide:{kin:fkin(gsi,ti),name:SIGNS[gsi].name},
    opp:{kin:fkin(osi,ti),name:SIGNS[osi].name},
    mystery:{kin:mk,name:SIGNS[msi].name},
    analog:{kin:fkin(asi,ti),name:SIGNS[asi].name},
    absOpp:{kin:abk,name:SIGNS[absi].name}
  };
}

  var rlist=[

// ===== 人物管理（DOM直接操作） =====
// persons[i] = {kin, si, ti} — 鑑定後に設定
var persons=[{kin:null,si:null,ti:null}];

// 年月日セレクトを初期化（DOMに既にある要素に対して）
function initSelects(block){
  var fy=block.querySelector('.f-y');
  var fm=block.querySelector('.f-m');
  var fd=block.querySelector('.f-d');
  fy.innerHTML='<option value="0">年</option>';
  for(var y=2010;y>=1900;y--) fy.innerHTML+='<option value="'+y+'">'+y+'</option>';
  fm.innerHTML='<option value="0">月</option>';
  for(var m=1;m<=12;m++) fm.innerHTML+='<option value="'+m+'">'+m+'</option>';
  fd.innerHTML='<option value="0">日</option>';
  for(var d=1;d<=31;d++) fd.innerHTML+='<option value="'+d+'">'+d+'</option>';
}

// 初期ブロックのセレクトを初期化
initSelects(document.getElementById('block-0'));

// 人物追加
document.getElementById('addBtn').addEventListener('click',function(){
  var idx=persons.length;
  persons.push({kin:null,si:null,ti:null});

  // 既存ブロックを非表示
  document.querySelectorAll('.person-block').forEach(function(b){b.classList.remove('active');});
  // タブを非アクティブ
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});

  // 新ブロック作成
  var block=document.createElement('div');
  block.className='person-block active';
  block.id='block-'+idx;
  block.innerHTML=
    '<div class="input-card">'
    +'<div class="field"><label>名前（任意）</label>'
    +'<input type="text" class="f-name" placeholder="例：超人"></div>'
    +'<div class="field"><label>生年月日</label>'
    +'<div class="dob-row">'
    +'<select class="f-y"></select>'
    +'<select class="f-m"></select>'
    +'<select class="f-d"></select>'
    +'</div></div>'
    +'<button class="kantei-btn">鑑　定　す　る</button>'
    +'</div>'
    +'<div class="result-area"></div>';
  document.getElementById('persons-wrap').appendChild(block);
  initSelects(block);

  // 新タブ追加（追加ボタンの前に挿入）
  var newTab=document.createElement('button');
  newTab.className='tab-btn active';
  newTab.dataset.target='block-'+idx;
  newTab.textContent='人物'+(idx+1);
  document.getElementById('tabsRow').insertBefore(newTab,document.getElementById('addBtn'));

  // 鑑定ボタンにイベント
  block.querySelector('.kantei-btn').addEventListener('click',function(){
    doKantei(idx,block);
  });
  // 名前入力でタブ更新
  block.querySelector('.f-name').addEventListener('input',function(){
    newTab.textContent=this.value||'人物'+(idx+1);
  });
});

// タブ切り替え（イベント委任）
document.getElementById('tabsRow').addEventListener('click',function(e){
  var btn=e.target.closest('.tab-btn');
  if(!btn||btn.id==='addBtn')return;
  var target=btn.dataset.target;
  if(!target)return;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.person-block').forEach(function(b){b.classList.remove('active');});
  var block=document.getElementById(target);
  if(block)block.classList.add('active');
});

// 最初のブロックの鑑定ボタン
document.querySelector('#block-0 .kantei-btn').addEventListener('click',function(){
  doKantei(0,document.getElementById('block-0'));
});
// 最初のブロックの名前入力
document.querySelector('#block-0 .f-name').addEventListener('input',function(){
  var tab=document.querySelector('[data-target="block-0"]');
  if(tab)tab.textContent=this.value||'人物1';
});

// 鑑定処理
function doKantei(idx,block){
  var y=parseInt(block.querySelector('.f-y').value,10);
  var m=parseInt(block.querySelector('.f-m').value,10);
  var d=parseInt(block.querySelector('.f-d').value,10);
  if(!y||!m||!d){alert('生年月日を選択してください');return;}
  var kin=calcKin(y,m,d);
  var info=kinInfo(kin);
  persons[idx]={kin:kin,si:info.si,ti:info.ti};
  block.querySelector('.result-area').innerHTML=resultHTML(kin,info.si,info.ti);
  updateCompat();
}

// 相性
function updateCompat(){
  var done=[];
  for(var i=0;i<persons.length;i++)if(persons[i].kin)done.push(i);
  var wrap=document.getElementById('compatWrap');
  if(done.length<2){wrap.style.display='none';return;}
  wrap.style.display='block';
  var opts='',nameInp;
  for(var j=0;j<done.length;j++){
    var i=done[j];
    var block=document.getElementById('block-'+i);
    var name=(block&&block.querySelector('.f-name').value)||('人物'+(i+1));
    opts+='<option value="'+i+'">'+name+'（KIN'+persons[i].kin+'）</option>';
  }
  document.getElementById('compatA').innerHTML=opts;
  document.getElementById('compatB').innerHTML=opts;
  if(document.getElementById('compatB').options.length>1)
    document.getElementById('compatB').selectedIndex=1;
}

function scC(a,b){
  var d=Math.abs(a-b),ca=SIGNS[a].color,cb=SIGNS[b].color;
  var cp={"赤":"白","白":"赤","青":"黄","黄":"青"};
  if(d===0)return{score:95,label:"同じ紋章 — 魂の鏡",text:"同じ紋章を持つ稀有な出会いです。まるで魂の鏡のような存在同士で、深い理解と共感が自然に生まれる関係です。"};
  if(d===10)return{score:88,label:"反対の紋章 — 最高の学び合い",text:"マヤ暦で対極のKinと呼ばれる特別な関係です。真逆のように見えて、実はお互いの欠けている部分を完全に補い合います。"};
  if(ca===cb)return{score:80,label:"同色の紋章 — 自然な調和",text:"同じ色のエネルギーを持つ仲間です。価値観の根っこが似ているため、大切なことについて深く共鳴できます。"};
  if(cp[ca]===cb)return{score:75,label:"補完し合う紋章 — 協力関係",text:"異なる色のエネルギーが補い合う関係です。得意なことが違うからこそ、二人で組むと大きな力を発揮します。"};
  return{score:60,label:"個性的な化学反応",text:"お互いの違いが際立つ関係ですが、それはむしろ刺激とチャンスです。個性を尊重することで予想外の化学反応が生まれます。"};
}
function tcC(a,b){
  var d=Math.abs(a-b);
  if(d===0)return{score:92,label:"同じ音 — 完全共鳴"};
  if(d===6||d===7)return{score:85,label:"対の音 — 深い絆"};
  if([1,4,5,8,12].indexOf(d)>=0)return{score:72,label:"調和する音"};
  return{score:58,label:"個性的なリズム"};
}

document.getElementById('compatBtn').addEventListener('click',function(){
  var iA=parseInt(document.getElementById('compatA').value,10);
  var iB=parseInt(document.getElementById('compatB').value,10);
  if(iA===iB){alert('異なる人物を選んでください');return;}
  var a=persons[iA],b=persons[iB];
  var sc=scC(a.si,b.si),tc=tcC(a.ti,b.ti),ov=Math.round((sc.score+tc.score)/2);
  document.getElementById('compatResult').innerHTML=
    '<div class="score-box">'
    +'<div class="score-big">'+ov+'<span style="font-size:20px;font-weight:300;color:#b0a090"> %</span></div>'
    +'<div class="score-sub">総 合 相 性 ス コ ア</div>'
    +'<div class="bar-grid">'
    +'<div><div class="blr"><span>紋章の相性</span><span>'+sc.score+'%</span></div><div class="bar"><div class="barf" style="width:'+sc.score+'%"></div></div><div class="bar-note">'+sc.label+'</div></div>'
    +'<div><div class="blr"><span>音の共鳴</span><span>'+tc.score+'%</span></div><div class="bar"><div class="barf" style="width:'+tc.score+'%"></div></div><div class="bar-note">'+tc.label+'</div></div>'
    +'</div><div class="ctext">'+sc.text+'</div></div>';
});
