function digitSum(n){
  while(n>=10){let s=0;while(n>0){s+=n%10;n=Math.floor(n/10);}n=s;}
  return n;
}

// 本命星: 11式（各桁の和 → 11から引く）
function getStarNum(y,m,d){
  let adjY=(m<2||(m===2&&d<=3))?y-1:y;
  let ds=digitSum(adjY);
  let s=11-ds; while(s<=0)s+=9; while(s>9)s-=9;
  return s;
}

// 年盤（年運）: 10式
function getYearBan(y){
  let ds=digitSum(y);
  let s=10-ds; while(s<=0)s+=9; while(s>9)s-=9;
  return s;
}

// 月命星: 節入り日テーブル基準
const SEKKI=[6,4,6,5,6,6,7,7,8,8,7,7];
function getMonthStar(y,m,d,honmeiNum){
  let adjM=m;
  if(d < SEKKI[m-1]) adjM=m-1;
  if(adjM<1) adjM=12;
  // 本命星グループ: 1,4,7→寅月基準=8, 2,5,8→寅月基準=2, 3,6,9→寅月基準=5
  let base;
  if([1,4,7].includes(honmeiNum)) base=8;
  else if([2,5,8].includes(honmeiNum)) base=2;
  else base=5;
  let ms=base-(adjM-2); while(ms<1)ms+=9; while(ms>9)ms-=9;
  return ms;
}

function getDayStar(y,m,d){
  const epoch=new Date(2000,0,7);
  const target=new Date(y,m-1,d);
  const diff=Math.round((target-epoch)/86400000);
  let s=((diff%9)+9)%9+1; if(s>9)s-=9;
  return s;
}

function getStar(n){return STARS[n-1]}

const KANSHI_Y=['甲子','乙丑','丙寅','丁卯','戊辰','己巳','庚午','辛未','壬申','癸酉','甲戌','乙亥','丙子','丁丑','戊寅','己卯','庚辰','辛巳','壬午','癸未','甲申','乙酉','丙戌','丁亥','戊子','己丑','庚寅','辛卯','壬辰','癸巳','甲午','乙未','丙申','丁酉','戊戌','己亥','庚子','辛丑','壬寅','癸卯','甲辰','乙巳','丙午','丁未','戊申','己酉','庚戌','辛亥','壬子','癸丑','甲寅','乙卯','丙辰','丁巳','戊午','己未','庚申','辛酉','壬戌','癸亥'];
function getYearKanshi(y){return KANSHI_Y[(y-4)%60]}

// 六曜: 旧暦(朔)ベースで正確に計算
function _jd(y,m,d){
  let a=Math.floor((14-m)/12);
  let yr=y+4800-a; let mo=m+12*a-3;
  return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
}
function _newMoonJD(k){
  let T=k/1236.85;
  return 2451550.09766+29.530588861*k+0.00015437*T*T-0.000000150*T*T*T;
}
const ROKKI=['大安','赤口','先勝','友引','先負','仏滅'];
function getRokki(y,m,d){
  let targetJD=_jd(y,m,d);
  let k=Math.round((y+(m-1)/12-2000)*12.3685);
  while(_newMoonJD(k+1)<=targetJD)k++;
  while(_newMoonJD(k)>targetJD)k--;
  let sakuJD=_newMoonJD(k);
  let kyuDay=Math.floor(targetJD-sakuJD)+1;
  let kyuMonth=m-1; if(kyuMonth<1)kyuMonth+=12;
  return ROKKI[(kyuMonth+kyuDay)%6];
}

function getNichiYoshi(y,m,d){
  const t=new Date(y,m-1,d);
  const day=t.getDay();
  if((m===1||m===2||m===5||m===6)&&(day===0||day===4)) return '一粒万倍日';
  if((m===3||m===4||m===7||m===8)&&(day===0||day===3)) return '一粒万倍日';
  return '-';
}

// 傾斜: 月命星の対宮（1↔9, 2↔8, 3↔7, 4↔6, 5↔5）
const MIYA_NAME=['','坎宮','坤宮','震宮','巽宮','中宮','乾宮','兌宮','艮宮','離宮'];
const TAIKYU=[0,9,8,7,6,5,4,3,2,1];
function getKessei(honmei,monthStar){
  return MIYA_NAME[TAIKYU[monthStar]]+'傾斜';
}

const UNSEI_TEXT=['▲低迷期。充電と内省を。','△変化の兆し。慎重に。','○縁が広がる年。','◎発展・行動の好機！','△調整期。バランスを。','○安定と充実。','◎大きな収穫期。','△見直しと準備を。','▲浄化期。手放す勇気を。'];
const MONTH_UNSEI=['○縁と出会い多し','▲支出注意','◎決断好機','△体調管理を','○人間関係良好','▲過信に注意','◎収穫・成果の月','△焦らず丁寧に','○学びの月'];

function nenun(star,year){
  return getYearBan(year);
}

const KOTENTEN_POS=[
  {n:1,dir:'北',  angle:270,r:52},
  {n:2,dir:'南西',angle:135,r:52},
  {n:3,dir:'東',  angle:0,  r:52},
  {n:4,dir:'南東',angle:45, r:52},
  {n:5,dir:'中',  angle:0,  r:0},
  {n:6,dir:'北西',angle:225,r:52},
  {n:7,dir:'西',  angle:180,r:52},
  {n:8,dir:'北東',angle:315,r:52},
  {n:9,dir:'南',  angle:90, r:52},
];

function drawCompass(honmeiNum,monthNum){
  const svg=document.getElementById('compass');
  svg.innerHTML='';
  const cx=100,cy=100,R=88,rm=58,rc=26;
  const borderCol='rgba(0,0,0,0.10)';

  for(let i=0;i<8;i++){
    const a1=((i*45)-22.5-90)*Math.PI/180;
    const a2=((i+1)*45-22.5-90)*Math.PI/180;
    const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    const ix1=cx+rm*Math.cos(a1),iy1=cy+rm*Math.sin(a1);
    const ix2=cx+rm*Math.cos(a2),iy2=cy+rm*Math.sin(a2);
    const pathD=`M${ix1},${iy1} L${x1},${y1} A${R},${R},0,0,1,${x2},${y2} L${ix2},${iy2} A${rm},${rm},0,0,0,${ix1},${iy1}Z`;
    const el=document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d',pathD);
    el.setAttribute('fill','rgba(0,0,0,0.025)');
    el.setAttribute('stroke',borderCol);
    el.setAttribute('stroke-width','0.5');
    svg.appendChild(el);
  }

  KOTENTEN_POS.forEach(p=>{
    const s=getStar(p.n);
    const isHonmei=p.n===honmeiNum;
    const isMonth=p.n===monthNum;
    if(p.n===5){
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',rc);
      c.setAttribute('fill',isHonmei?s.color:'rgba(0,0,0,0.04)');
      c.setAttribute('stroke',isHonmei?s.color:borderCol);
      c.setAttribute('stroke-width',isHonmei?'1.5':'0.5');
      svg.appendChild(c);
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',cx);t.setAttribute('y',cy+1);
      t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size','14');t.setAttribute('font-weight','500');
      t.setAttribute('fill',isHonmei?'#fff':s.color);
      t.textContent=p.n;
      svg.appendChild(t);
      return;
    }
    const rad=p.angle*Math.PI/180;
    const px=cx+p.r*Math.cos(rad),py=cy+p.r*Math.sin(rad);
    const circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circ.setAttribute('cx',px);circ.setAttribute('cy',py);circ.setAttribute('r',rc-8);
    circ.setAttribute('fill',isHonmei?s.color:isMonth?s.color+'44':'transparent');
    circ.setAttribute('stroke',isHonmei||isMonth?s.color:borderCol);
    circ.setAttribute('stroke-width',isHonmei?'1.5':isMonth?'1':'0.5');
    svg.appendChild(circ);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',px);t.setAttribute('y',py+1);
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','11');t.setAttribute('font-weight',isHonmei?'500':'400');
    t.setAttribute('fill',isHonmei?'#fff':s.color);
    t.textContent=p.n;
    svg.appendChild(t);
  });

  const dirs=[{l:'南',x:cx,y:cy-R+8},{l:'北',x:cx,y:cy+R-8},{l:'東',x:cx+R-8,y:cy},{l:'西',x:cx-R+8,y:cy}];
  dirs.forEach(d=>{
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',d.x);t.setAttribute('y',d.y);
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','9');t.setAttribute('fill','rgba(0,0,0,0.3)');
    t.textContent=d.l;
    svg.appendChild(t);
  });
}

function calc(){
  const val=document.getElementById('bdate').value;
  if(!val)return;
  const [y,m,d]=val.split('-').map(Number);
  const honmei=getStarNum(y,m,d);
  const msNum=getMonthStar(y,m,d,honmei);
  const dayStar=getDayStar(y,m,d);
  const hS=getStar(honmei),mS=getStar(msNum),dS=getStar(dayStar);
  const now=new Date();
  const cy=now.getFullYear(),cm=now.getMonth()+1;
  const age=cy-y-(now.getMonth()<m||(now.getMonth()===m-1&&now.getDate()<d)?1:0);

  document.getElementById('result').style.display='block';
  document.getElementById('birthLabel').textContent=`${y}年${m}月${d}日生まれの方`;
  document.getElementById('detailLabel').textContent=`${y}年${m}月${d}日生まれの方の基本情報`;

  document.getElementById('starRow').innerHTML=`
    <div class="star-pill"><span class="star-dot" style="background:${hS.color}"></span><span class="star-pill-label">本命星：</span><span class="star-pill-name">●${hS.name}</span></div>
    <div class="star-pill"><span class="star-dot" style="background:${mS.color}"></span><span class="star-pill-label">月命星：</span><span class="star-pill-name">●${mS.name}</span></div>`;

  document.getElementById('pillRow').innerHTML=`
    <button class="pill-btn" onclick="scrollToPers()"><span class="dot" style="background:${hS.color}"></span>●${hS.name}の詳細 ›</button>
    <button class="pill-btn"><span class="dot" style="background:${mS.color}"></span>●${mS.name}の詳細 ›</button>`;

  const kichi=KICHI_MAP[hS.name];
  document.getElementById('basicTable').innerHTML=`
    <tr><td>生年月日</td><td>${y}年${m}月${d}日（${age}歳）</td></tr>
    <tr><td>本命星</td><td>${hS.name}</td></tr>
    <tr><td>月命星</td><td>${mS.name}</td></tr>
    <tr><td>日命星</td><td>${dS.name}</td></tr>
    <tr><td>傾斜</td><td>${getKessei(honmei,msNum)}</td></tr>
    <tr><td>最大吉方</td><td>${kichi?kichi.good.join('、'):'-'}</td></tr>`;

  document.getElementById('calTable').innerHTML=`
    <tr><td>年の干支</td><td>${getYearKanshi(y)}</td></tr>
    <tr><td>六曜</td><td>${getRokki(y,m,d)}</td></tr>
    <tr><td>日の吉凶</td><td>${getNichiYoshi(y,m,d)}</td></tr>
    <tr><td>陰遁/陽遁</td><td>${(m>=2&&m<=7)?'陽遁':'陰遁'}</td></tr>`;

  drawCompass(honmei,msNum);

  const houEl=document.getElementById('houGrid');
  const all=['北','北東','東','南東','南','南西','西','北西'];
  let hHtml='';
  if(kichi){
    kichi.good.forEach(d=>{hHtml+=`<div class="hou-item hou-good">✦ ${d}（吉）</div>`;});
    kichi.bad.forEach(d=>{hHtml+=`<div class="hou-item hou-bad">✕ ${d}（凶）</div>`;});
    all.forEach(d=>{if(!kichi.good.includes(d)&&!kichi.bad.includes(d))hHtml+=`<div class="hou-item">　${d}（普通）</div>`;});
  }
  houEl.innerHTML=hHtml;

  buildYear(honmei,cy);
  buildMonth(honmei,cy,cm);

  const persEl=document.getElementById('persCard');
  persEl.innerHTML=`<div class="pers-title">${hS.name}の性格</div>`
    +hS.pers.map(p=>`<p class="pers-para">${p.replace(/<b>(.*?)<\/b>/g,'<span class="pers-high">$1</span>')}</p>`).join('');

  // AI総合鑑定
  const kessei=getKessei(honmei,msNum);
  buildAiKandatei(hS.name, mS.name, dS.name, kessei);
}

async function buildAiKandatei(honmeiName, monthName, dayName, kessei){
  const aiCard=document.getElementById('aiCard');
  const aiResult=document.getElementById('aiResult');
  aiCard.style.display='block';
  aiResult.innerHTML='<span style="color:#bbb;font-size:12px">鑑定中...</span>';

  const prompt=`あなたは九星気学の専門家です。以下の情報をもとに、この人の性格・才能・人生の傾向・対人関係・注意点を総合的に鑑定してください。

本命星: ${honmeiName}
月命星: ${monthName}
日命星: ${dayName}
傾斜: ${kessei}

【鑑定のポイント】
- 本命星は人生全体の根本的な性質を表す
- 月命星は内面・感情・対人関係の傾向を表す
- 日命星はその日の気質・即興性・日常の行動を表す
- 傾斜は本命星と月命星の組み合わせから生まれる特有の方向性を表す

これらの星の組み合わせから生まれる独自の個性・強み・弱み・人生のテーマを400〜500字で、読みやすく段落に分けて日本語で書いてください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '鑑定結果を取得できませんでした。';
    aiResult.innerHTML = text.split('\n\n').map(p=>p.trim()).filter(p=>p)
      .map(p=>`<p style="margin-bottom:12px">${p}</p>`).join('');
  } catch(e) {
    aiResult.innerHTML='<span style="color:#c0392b;font-size:12px">鑑定の取得に失敗しました。</span>';
  }
}

function buildYear(star,cy){
  let html='';
  for(let i=-1;i<=2;i++){
    const yr=cy+i;
    const n=nenun(star,yr);
    const u=UNSEI_TEXT[(n-1)%9];
    const badge=u.startsWith('◎')?'b-kichi':u.startsWith('○')?'b-sho':u.startsWith('▲')?'b-kyo':'b-chu';
    const label=u.startsWith('◎')?'大吉':u.startsWith('○')?'吉':u.startsWith('▲')?'注意':'小吉';
    html+=`<div class="unsei-row"><span class="unsei-label">${yr}年（${i===0?'今年':i<0?Math.abs(i)+'年前':i+'年後'}）</span><span class="unsei-val">${getStar(n).name.replace('星','')}<span class="badge ${badge}">${label}</span></span></div>`;
  }
  document.getElementById('tab-year').innerHTML=html;
}

function buildMonth(star,cy,cm){
  let html='';
  for(let i=0;i<6;i++){
    let mo=cm+i,yr=cy;
    if(mo>12){mo-=12;yr++;}
    const n=nenun(star,yr);
    let ms=(n+(mo-1))%9+1; if(ms<1)ms+=9; if(ms>9)ms-=9;
    const u=MONTH_UNSEI[(ms-1)%9];
    const badge=u.startsWith('◎')?'b-kichi':u.startsWith('○')?'b-sho':u.startsWith('▲')?'b-kyo':'b-chu';
    const label=u.startsWith('◎')?'大吉':u.startsWith('○')?'吉':u.startsWith('▲')?'注意':'小吉';
    html+=`<div class="unsei-row"><span class="unsei-label">${yr}年${mo}月</span><span class="unsei-val">${u.slice(1)}<span class="badge ${badge}">${label}</span></span></div>`;
  }
  document.getElementById('tab-month').innerHTML=html;
}

function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-year').style.display=tab==='year'?'block':'none';
  document.getElementById('tab-month').style.display=tab==='month'?'block':'none';
}

function scrollToPers(){
  document.getElementById('persCard').scrollIntoView({behavior:'smooth'});
}
</script>
