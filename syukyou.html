<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宿曜占星術 — 二十七宿占い</title>
<style>
  :root{
    --bg-deep:#0f1830;
    --bg-deep2:#161f3d;
    --panel:#1b2547;
    --panel-light:#232e57;
    --gold:#d4af6a;
    --gold-soft:#e8cf9a;
    --ink:#eef0f7;
    --ink-dim:#aab2cc;
    --line:rgba(212,175,106,0.25);
    --good:#8fbf8a;
    --bad:#d98a7a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(212,175,106,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(120,140,220,0.08), transparent 60%),
      var(--bg-deep);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    padding:0 0 60px;
  }
  .stars{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.5;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff, transparent),
      radial-gradient(1px 1px at 80% 10%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, #fff, transparent),
      radial-gradient(1px 1px at 30% 80%, #fff, transparent),
      radial-gradient(1px 1px at 90% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 45% 35%, #fff, transparent),
      radial-gradient(1px 1px at 15% 55%, #fff, transparent),
      radial-gradient(1px 1px at 70% 90%, #fff, transparent);
    background-repeat:no-repeat;
  }
  .wrap{position:relative; z-index:1; max-width:720px; margin:0 auto; padding:0 20px;}
  header{
    text-align:center;
    padding:54px 20px 30px;
  }
  header .eyebrow{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    letter-spacing:0.3em; font-size:11px; color:var(--gold-soft);
    text-transform:uppercase; margin-bottom:14px;
  }
  h1{
    font-size:40px; letter-spacing:0.12em; margin:0 0 12px;
    color:var(--ink); font-weight:500;
    text-shadow:0 0 30px rgba(212,175,106,0.25);
  }
  header p{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    color:var(--ink-dim); font-size:14px; letter-spacing:0.04em;
  }
  .moonline{
    width:120px; height:1px; margin:22px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  nav.tabs{
    display:flex; gap:2px; margin:10px 0 0;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    flex:1; padding:16px 8px; background:transparent; border:none;
    color:var(--ink-dim); font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:15px; letter-spacing:0.08em; cursor:pointer; position:relative;
    transition:color .25s;
  }
  nav.tabs button.active{ color:var(--gold-soft); }
  nav.tabs button.active::after{
    content:""; position:absolute; left:10%; right:10%; bottom:-1px; height:2px;
    background:var(--gold);
  }
  nav.tabs button:hover{ color:var(--ink); }

  .panel{
    background:linear-gradient(180deg, var(--panel), var(--panel-light));
    border:1px solid var(--line);
    border-radius:2px;
    padding:40px 30px;
    margin-top:0;
    box-shadow:0 30px 60px -30px rgba(0,0,0,0.6);
  }
  .panel h2{
    text-align:center; font-size:26px; font-weight:500; letter-spacing:0.1em; margin:0 0 8px;
  }
  .panel .sub{
    text-align:center; color:var(--ink-dim); font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px; margin-bottom:30px;
  }

  .date-row{ display:flex; gap:10px; justify-content:center; margin-bottom:8px; flex-wrap:wrap;}
  .date-group{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .date-group label{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; color:var(--ink-dim); letter-spacing:.08em;}
  select{
    background:var(--bg-deep2); color:var(--ink); border:1px solid var(--line);
    border-radius:3px; padding:10px 14px; font-size:15px;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    min-width:90px; text-align:center;
  }
  select:focus{ outline:none; border-color:var(--gold); }

  .two-people{ display:flex; gap:18px; justify-content:center; flex-wrap:wrap; margin-bottom:10px;}
  .person-block{
    border:1px solid var(--line); border-radius:4px; padding:18px 16px 20px;
    background:rgba(0,0,0,0.12);
  }
  .person-block .ptitle{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:12px; color:var(--gold-soft); letter-spacing:.1em; margin-bottom:12px; text-align:center;
  }

  .go-btn{
    display:block; margin:30px auto 0; padding:14px 46px;
    background:linear-gradient(180deg,#c79b54,#a9793a);
    color:#1b1206; border:none; border-radius:3px; cursor:pointer;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:15px; letter-spacing:.12em; font-weight:600;
    box-shadow:0 10px 24px -10px rgba(212,175,106,0.6);
    transition:transform .15s, box-shadow .15s;
  }
  .go-btn:hover{ transform:translateY(-1px); box-shadow:0 14px 28px -10px rgba(212,175,106,0.75); }
  .go-btn:active{ transform:translateY(0); }

  .result{
    margin-top:36px; padding-top:30px; border-top:1px solid var(--line);
    display:none;
  }
  .result.show{ display:block; animation:fadein .4s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .suku-badge{
    text-align:center; margin-bottom:24px;
  }
  .suku-badge .nm{
    font-size:34px; letter-spacing:.1em; color:var(--gold-soft);
    text-shadow:0 0 24px rgba(212,175,106,0.35);
  }
  .suku-badge .kana{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:12px; color:var(--ink-dim); letter-spacing:.1em; margin-top:4px;
  }
  .tag-row{ display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap;}
  .tag{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:11px; letter-spacing:.05em; color:var(--ink-dim);
    border:1px solid var(--line); border-radius:20px; padding:5px 14px;
  }
  .desc{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:14.5px; line-height:1.9; color:var(--ink);
    background:rgba(0,0,0,0.18); border-radius:4px; padding:20px 22px;
  }
  .desc + .desc{ margin-top:14px; }
  .field-label{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:11px; color:var(--gold-soft); letter-spacing:.12em; margin:22px 0 8px;
  }

  .compat-grid{
    display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:18px;
  }
  .compat-grid .cp-name{ font-size:20px; color:var(--gold-soft); text-align:center;}
  .compat-grid .cp-arrow{ color:var(--ink-dim); font-size:20px;}
  .relation-pill{
    display:block; width:fit-content; margin:0 auto 18px; padding:8px 24px;
    border:1px solid var(--gold); border-radius:20px; color:var(--gold-soft);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:14px; letter-spacing:.1em;
  }

  .fortune-meter{
    display:flex; justify-content:center; gap:6px; margin:18px 0 22px;
  }
  .fortune-meter span{
    width:10px; height:10px; border-radius:50%; background:rgba(212,175,106,0.18);
  }
  .fortune-meter span.on{ background:var(--gold); }

  footer{
    text-align:center; margin-top:50px; color:var(--ink-dim);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; letter-spacing:.05em;
    opacity:0.7;
  }

  @media (max-width:480px){
    h1{ font-size:30px; }
    .panel{ padding:30px 18px; }
    .date-group{ width:30%; }
    select{ width:100%; min-width:0; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">

  <header>
    <div class="eyebrow">SHUKUYO ASTROLOGY · 二十七宿</div>

  <!-- 性格占い -->

      <div class="field-label">性格・特徴</div>

      <div class="field-label">恋愛・対人</div>
      <div class="desc" id="p-love"></div>
      <div class="field-label">ラッキーカラー</div>
      <div class="desc" id="p-color"></div>
      <div class="field-label" id="p-weekday-label"></div>
      <div class="desc" id="p-weekday"></div>
    </div>
  </section>

  <!-- 相性占い -->
  <section class="panel tab-pane" id="pane-compat" style="display:none;">
    <h2>相性占い</h2>
    <div class="sub">二人の生年月日から、宿どうしの関係を占います</div>

    <div class="two-people">
      <div class="person-block">
        <div class="ptitle">A さん</div>
        <div class="date-row">
          <div class="date-group"><label>年</label><select id="c1-year"></select></div>
          <div class="date-group"><label>月</label><select id="c1-month"></select></div>
          <div class="date-group"><label>日</label><select id="c1-day"></select></div>
        </div>
      </div>
      <div class="person-block">
        <div class="ptitle">B さん</div>
        <div class="date-row">
          <div class="date-group"><label>年</label><select id="c2-year"></select></div>
          <div class="date-group"><label>月</label><select id="c2-month"></select></div>
          <div class="date-group"><label>日</label><select id="c2-day"></select></div>
        </div>
      </div>
    </div>

    <button class="go-btn" id="c-go">占う</button>

    <div class="result" id="c-result">
      <div class="compat-grid">
        <div class="cp-name" id="c-name1"></div>
        <div class="cp-arrow">⟷</div>
        <div class="cp-name" id="c-name2"></div>
      </div>
      <div class="relation-pill" id="c-relation"></div>
      <div class="desc" id="c-desc"></div>
    </div>
  </section>

  <!-- 運勢占い -->
  <section class="panel tab-pane" id="pane-fortune" style="display:none;">
    <h2>運勢占い</h2>
    <div class="sub">あなたの本命宿から、今日の運勢を占います</div>

    <div class="date-row">
      <div class="date-group">
        <label>年</label>
        <select id="f-year"></select>
      </div>
      <div class="date-group">
        <label>月</label>
        <select id="f-month"></select>
      </div>
      <div class="date-group">
        <label>日</label>
        <select id="f-day"></select>
      </div>
    </div>

    <button class="go-btn" id="f-go">占う</button>

    <div class="result" id="f-result">
      <div class="compat-grid">
        <div class="cp-name" id="f-name1"></div>
        <div class="cp-arrow">⟷</div>
        <div class="cp-name" id="f-name2"></div>
      </div>
      <div class="relation-pill" id="f-relation"></div>
      <div class="fortune-meter" id="f-meter"></div>
      <div class="desc" id="f-desc"></div>
    </div>
  </section>

  <footer>※ 本サービスは簡易計算によるエンターテインメント占いです。厳密な旧暦換算とは多少のずれが生じる場合があります。</footer>
</div>

/* 命/業/胎 を除く8関係を順に配置（簡易三九の法） */
const REL8 = ["栄","親","友","安","壊","危","成","衰"];
function relationName(offset){
  // offset: 0-26, base(自分)から見て相手が何個先か
  const mod = ((offset % N) + N) % N;
  const third = Math.floor(mod / 9);   // 0,1,2
  const pos = mod % 9;                  // 0-8
  if(pos === 0){ return ["命","業","胎"][third]; }
  return REL8[pos-1];
}

/* ---------- 27宿の暦カレンダー計算 ----------
   2026年6月20日 = 張宿（index 24）を基準点とし、
   27日サイクルで近似計算します（簡易版）。
-------------------------------------------------*/
const ANCHOR_DATE = new Date(Date.UTC(1968,1,6)); // 1968-02-06
const ANCHOR_INDEX = SUKU.findIndex(s=>s.name==="觜宿");

function dateToUTC(y,m,d){ return new Date(Date.UTC(y, m-1, d)); }

function sukuIndexForDate(y,m,d){
  const target = dateToUTC(y,m,d);
  const diffDays = Math.round((target - ANCHOR_DATE) / 86400000);
  let idx = (ANCHOR_INDEX + diffDays) % N;
  idx = ((idx % N) + N) % N;
  return idx;
}

/* ---------- UI セットアップ ---------- */
function fillSelect(sel, start, end, defaultVal){
  for(let v=start; v<=end; v++){
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    if(v===defaultVal) opt.selected = true;
    sel.appendChild(opt);
  }
}
function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function setupDateSelectors(prefix, defY, defM, defD){
  const y = document.getElementById(prefix+"-year");
  const m = document.getElementById(prefix+"-month");
  const d = document.getElementById(prefix+"-day");
  const thisYear = new Date().getFullYear();
  fillSelect(y, 1920, thisYear, defY);
  fillSelect(m, 1, 12, defM);
  function rebuildDays(){
    const yy = parseInt(y.value), mm = parseInt(m.value);
    const max = daysInMonth(yy, mm);
    const cur = parseInt(d.value) || defD;
    d.innerHTML = "";
    fillSelect(d, 1, max, Math.min(cur, max));
  }
  rebuildDays();
  y.addEventListener("change", rebuildDays);
  m.addEventListener("change", rebuildDays);
}

const today = new Date();
setupDateSelectors("p", 1990, 1, 1);
setupDateSelectors("c1", 1990, 1, 1);
setupDateSelectors("c2", 1990, 1, 1);
setupDateSelectors("f", 1990, 1, 1);

function getDate(prefix){
  return {
    y: parseInt(document.getElementById(prefix+"-year").value),
    m: parseInt(document.getElementById(prefix+"-month").value),
    d: parseInt(document.getElementById(prefix+"-day").value),
  };
}

/* ---------- 相性占い ---------- */
document.getElementById("c-go").addEventListener("click", ()=>{
  const d1 = getDate("c1"), d2 = getDate("c2");
  const i1 = sukuIndexForDate(d1.y,d1.m,d1.d);
  const i2 = sukuIndexForDate(d2.y,d2.m,d2.d);
  const s1 = SUKU[i1], s2 = SUKU[i2];
  const rel = relationName(i2 - i1);
  document.getElementById("c-name1").textContent = "A："+s1.name;
  document.getElementById("c-name2").textContent = "B："+s2.name;
  document.getElementById("c-relation").textContent = "関係：「"+rel+"」の縁";
  document.getElementById("c-desc").textContent = RELATION_DESC[rel];
  document.getElementById("c-result").classList.add("show");
});

/* ---------- 運勢占い ---------- */
document.getElementById("f-go").addEventListener("click", ()=>{
  const {y,m,d} = getDate("f");
  const myIdx = sukuIndexForDate(y,m,d);
  const t = new Date();
  const todayIdx = sukuIndexForDate(t.getFullYear(), t.getMonth()+1, t.getDate());
  const mySuku = SUKU[myIdx], todaySuku = SUKU[todayIdx];
  const rel = relationName(todayIdx - myIdx);
  document.getElementById("f-name1").textContent = "本命："+mySuku.name;
  document.getElementById("f-name2").textContent = "今日："+todaySuku.name;
  document.getElementById("f-relation").textContent = "今日の関係：「"+rel+"」";
  document.getElementById("f-desc").textContent = RELATION_DESC[rel];

  // 簡易吉凶メーター（5段階）
  const score = {
    "命":4,"栄":5,"親":4,"友":4,"成":5,"安":3,"業":3,"胎":3,"壊":1,"危":2,"衰":2
  }[rel] ?? 3;
  const meter = document.getElementById("f-meter");
  meter.innerHTML = "";
  for(let i=0;i<5;i++){
    const dot = document.createElement("span");
    if(i < score) dot.classList.add("on");
    meter.appendChild(dot);
  }
  document.getElementById("f-result").classList.add("show");
});
