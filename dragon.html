<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天地ドラゴン占い</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ee;--paper:#faf8f3;--ink:#1c1a16;--ink2:#4a4540;--ink3:#8a8278;
  --gold:#9a7a2e;--gl:#c4a050;--gbg:#f5edd8;
  --indigo:#2b3a5c;--il:#3d5280;
  --jade:#1a6b52;--jbg:#e4f0eb;
  --violet:#5a3a7a;--vbg:#ede8f5;
  --border:#d8d0c0;--borderl:#ece5d8;
}
body{font-family:"Shippori Mincho","Noto Serif JP",serif;background:var(--bg);min-height:100vh;color:var(--ink);display:flex;justify-content:center;padding:0 0 4rem}
.wrap{width:100%;max-width:600px;padding:0 1.25rem}

.site-header{background:var(--indigo);text-align:center;padding:2rem 1.5rem 1.75rem;margin-bottom:2rem;position:relative}
.site-header::after{content:"";position:absolute;bottom:-8px;left:0;width:100%;height:8px;background:linear-gradient(180deg,rgba(43,58,92,.15),transparent)}
.hlogo{display:inline-flex;align-items:center;gap:10px;margin-bottom:.75rem}
.htitle{font-size:22px;font-weight:700;color:#f0e8d0;letter-spacing:.18em}
.hsub{font-size:11px;color:rgba(240,232,208,.45);letter-spacing:.3em;margin-top:6px}
.hline{width:80px;height:1px;background:rgba(196,160,80,.5);margin:.9rem auto}
.hdesc{font-size:12px;color:rgba(240,232,208,.55);letter-spacing:.08em;line-height:1.7;max-width:340px;margin:0 auto}

.steps-bar{display:flex;align-items:center;justify-content:center;margin:1.5rem 0 1.75rem}
.step-node{display:flex;flex-direction:column;align-items:center;gap:4px}
.snc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--paper);color:var(--ink3);font-family:"Noto Serif JP",serif}
.snc.active{background:var(--indigo);color:#f0e8d0;border-color:var(--indigo)}
.snc.done{background:var(--gbg);color:var(--gold);border-color:var(--gl)}
.snl{font-size:10px;color:var(--ink3);letter-spacing:.08em;white-space:nowrap}
.snl.active{color:var(--indigo);font-weight:500}
.step-line{width:48px;height:1px;background:var(--border);margin:0 4px 18px}

.step{display:none}.step.on{display:block}
.sec-label{font-size:11px;color:var(--ink3);letter-spacing:.2em;text-align:center;margin-bottom:.5rem}
.sec-title{font-size:17px;font-weight:500;color:var(--ink);text-align:center;margin-bottom:.3rem;letter-spacing:.05em}
.sec-hint{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:1.25rem}

.card{background:var(--paper);border:1px solid var(--borderl);border-radius:12px;padding:1.25rem 1.4rem;margin-bottom:1rem}
.card-title{font-size:11px;color:var(--ink3);letter-spacing:.2em;margin-bottom:.9rem;display:flex;align-items:center;gap:6px}
.card-title::before{content:"";display:inline-block;width:3px;height:12px;background:var(--gl);border-radius:2px}

.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.field label{font-size:11px;color:var(--ink3);display:block;margin-bottom:4px;letter-spacing:.08em}
.field input,.field select{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--ink);font-family:"Shippori Mincho","Noto Serif JP",serif;font-size:13px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--il);box-shadow:0 0 0 3px rgba(61,82,128,.08)}
.field select option{background:#fff;color:var(--ink)}

.place-presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pp{background:#fff;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .15s;font-family:"Shippori Mincho",serif}
.pp:hover{border-color:var(--il);color:var(--indigo)}
.pp.sel{border-color:var(--indigo);color:#fff;background:var(--indigo)}

.btn-primary{display:block;width:100%;max-width:280px;margin:1.5rem auto 0;padding:12px;background:var(--indigo);border:none;border-radius:8px;color:#f0e8d0;font-family:"Shippori Mincho","Noto Serif JP",serif;font-size:14px;cursor:pointer;letter-spacing:.2em;transition:all .2s;font-weight:500}
.btn-primary:hover{background:var(--il)}
.btn-ghost{display:block;width:100%;max-width:200px;margin:1.5rem auto 0;background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--ink3);font-family:"Shippori Mincho",serif;font-size:12px;cursor:pointer;letter-spacing:.15em;transition:all .2s}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink2)}

.trinity{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:1.25rem 0}
.tri-item{border-radius:10px;padding:14px 8px;text-align:center;border:1px solid}
.tri-item.ten{background:var(--jbg);border-color:rgba(26,107,82,.2);color:var(--jade)}
.tri-item.chi{background:var(--gbg);border-color:rgba(154,122,46,.22);color:var(--gold)}
.tri-item.asc{background:var(--vbg);border-color:rgba(90,58,122,.2);color:var(--violet)}
.tri-sym{font-size:26px;line-height:1;margin-bottom:4px}
.tri-nm{font-size:12px;font-weight:500;margin-bottom:2px}
.tri-el{font-size:10px;opacity:.6}
.tri-role{font-size:9px;letter-spacing:.12em;margin-top:5px;padding:2px 8px;border-radius:20px;display:inline-block;background:rgba(255,255,255,.5)}

.result-hero{background:var(--indigo);border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1rem;color:#f0e8d0}
.rh-label{font-size:10px;letter-spacing:.25em;color:rgba(240,232,208,.5);margin-bottom:.4rem}
.rh-title{font-size:21px;font-weight:700;letter-spacing:.1em;margin-bottom:.4rem}
.rh-flower{font-size:12px;color:rgba(196,160,80,.8)}
.rh-sep{width:60px;height:1px;background:rgba(196,160,80,.35);margin:.75rem auto}

.result-reading{font-size:15px;line-height:2;color:var(--ink);padding:1.4rem;background:var(--paper);border:1px solid var(--borderl);border-radius:12px;margin-bottom:1rem}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.8rem}
.rg-card{padding:1rem;border-radius:10px;border:1px solid}
.rg-card.gift{background:var(--jbg);border-color:rgba(26,107,82,.2)}
.rg-card.shadow{background:var(--gbg);border-color:rgba(154,122,46,.2)}
.rg-card.asc-card{background:var(--vbg);border-color:rgba(90,58,122,.2);grid-column:1/-1}
.rg-label{font-size:10px;letter-spacing:.18em;margin-bottom:.5rem;font-weight:500}
.rg-card.gift .rg-label{color:var(--jade)}
.rg-card.shadow .rg-label{color:var(--gold)}
.rg-card.asc-card .rg-label{color:var(--violet)}
.rg-text{font-size:13px;line-height:1.85;color:var(--ink2)}

.mantra-box{background:var(--indigo);border-radius:10px;padding:1.1rem;text-align:center;margin-bottom:1rem}
.mantra-label{font-size:10px;letter-spacing:.25em;color:rgba(240,232,208,.45);margin-bottom:.4rem}
.mantra-text{font-size:18px;color:#f0e8d0;letter-spacing:.18em;font-weight:500}

.tags-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:1rem 0}
.tag{padding:4px 12px;border-radius:20px;font-size:11px;letter-spacing:.06em}
.tag.tg{background:var(--jbg);color:var(--jade);border:1px solid rgba(26,107,82,.2)}
.tag.tc{background:var(--gbg);color:var(--gold);border:1px solid rgba(154,122,46,.2)}
.tag.ta{background:var(--vbg);color:var(--violet);border:1px solid rgba(90,58,122,.2)}

.jst-note{font-size:11px;color:var(--ink3);text-align:center;margin-bottom:1.25rem}
</style>
</head>
<body>
<div class="wrap">

  <div class="site-header">
    <div class="hlogo">
      <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="18" cy="18" rx="16" ry="9.5" fill="none" stroke="#c4a050" stroke-width="0.9"/>
        <circle cx="18" cy="18" r="5.5" fill="none" stroke="#c4a050" stroke-width="0.9"/>
        <circle cx="18" cy="18" r="2.5" fill="#c4a050" opacity="0.9"/>
        <line x1="18" y1="3" x2="18" y2="8.5" stroke="#c4a050" stroke-width="0.7" opacity="0.5"/>
        <line x1="18" y1="27.5" x2="18" y2="33" stroke="#c4a050" stroke-width="0.7" opacity="0.5"/>
      </svg>
      <div class="htitle">天地ドラゴン占い</div>
    </div>
    <div class="hsub">TENCHI DRAGON URANAI</div>
    <div class="hline"></div>
    <div class="hdesc">天の種が地の器にポチンと落ちて、どんな花を咲かせるか<br>三星の融合をトート神が読み解く</div>
  </div>

  <div class="steps-bar">
    <div class="step-node">
      <div class="snc active" id="sn1">1</div>
      <div class="snl active" id="sl1">生年月日入力</div>
    </div>
    <div class="step-line"></div>
    <div class="step-node">
      <div class="snc" id="sn2">2</div>
      <div class="snl" id="sl2">星の融合を読む</div>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="step on" id="step1">
    <div class="sec-label">BIRTH DATA</div>
    <div class="sec-title">生年月日・出生時刻・出生地</div>
    <div class="sec-hint">アセンダント（上昇星座）算出のため出生地が必要です</div>

    <div class="card">
      <div class="card-title">生年月日</div>
      <div class="row3">
        <div class="field"><label>年</label><input type="number" id="year" min="1900" max="2099" placeholder="例：1990"></div>
        <div class="field"><label>月</label>
          <select id="month">
            <option value="" selected>月</option>
            <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
            <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
            <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
          </select>
        </div>
        <div class="field"><label>日</label><input type="number" id="day" min="1" max="31" placeholder="例：15"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">出生時刻（JST）</div>
      <div class="row2">
        <div class="field"><label>時</label><input type="number" id="hour" min="0" max="23" placeholder="例：12"></div>
        <div class="field"><label>分</label><input type="number" id="min" min="0" max="59" placeholder="例：30"></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink3);cursor:pointer;margin-top:4px">
        <input type="checkbox" id="timeUnknown" onchange="toggleTime(this)" style="width:14px;height:14px;accent-color:var(--indigo)">
        出生時刻が不明（アセンダントは正午で計算）
      </label>
    </div>

    <div class="card">
      <div class="card-title">出生地</div>
      <div class="place-presets" id="presets"></div>
      <div class="row2" style="margin-bottom:4px">
        <div class="field"><label>緯度</label><input type="number" id="lat" step="0.01" placeholder="例：35.69"></div>
        <div class="field"><label>経度</label><input type="number" id="lng" step="0.01" placeholder="例：139.69"></div>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin-top:4px">プリセット以外は緯度経度を直接入力</div>
    </div>

    <div class="jst-note">※ タイムゾーンはJST（日本標準時 UTC+9）で計算します</div>
    <button class="btn-primary" onclick="calculate()">星を読む</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div id="resultContainer"></div>
    <button class="btn-ghost" onclick="restart()">もう一度占う</button>
  </div>

</div>
<script>
var READINGS={"牡羊座":{"牡羊座":{"title":"炎の一点突破","flower":"赤い野バラ","reading":"天と地がともに炎の開拓者。あなたの内なる炎は器をも焼き尽くし、ただまっすぐに前へ進む。誰も踏み入れぬ荒野に最初の足跡を刻むのがあなたの使命。迷いは不要、行動こそが祈りである。","gift":"誰も躊躇う瞬間に最初に動ける胆力","shadow":"慎重さを持てば失敗しないという思い込み","mantra":"我は炎、道を拓く"},"牡牛座":{"title":"大地に宿る火種","flower":"ひまわり","reading":"燃える種が豊かな大地の器に落ちた。あなたは焦らず、しかし確実に根を張りながら咲く。外見は穏やかで堅実に見えるが、内側には誰も消せない情熱の火がある。その火が実りをつくる。","gift":"情熱を持続的なカタチに変える力","shadow":"安定を得てから動くべきという思い込み","mantra":"静かな火が山を動かす"},"双子座":{"title":"風に乗る火の粉","flower":"コスモス","reading":"開拓の炎が言葉と知の器に宿った。あなたのアイデアは火花のように飛び散り、周囲に着火させる。好奇心の赴くまま動くその姿が、実は新しい時代の道標となっている。","gift":"ひらめきを言葉にして人を動かす力","shadow":"一つに絞らなければいけないという思い込み","mantra":"言葉は炎、世界を灯す"},"蟹座":{"title":"守り火の番人","flower":"赤いカーネーション","reading":"炎の種が深い慈愛の器に包まれた。あなたは愛する人を守るとき、誰よりも勇敢になる。外には繊細に見えるが、大切なものへの情熱は誰にも消せない。家族と仲間があなたの戦場だ。","gift":"愛するものを命がけで守り抜く強さ","shadow":"強くあることと優しくあることは矛盾するという思い込み","mantra":"愛が最強の炎"},"獅子座":{"title":"王冠の炎","flower":"赤いバラ","reading":"開拓者の魂が誇り高き王の器に宿った。あなたが舞台に立つとき、場の空気が変わる。内なる炎と外の輝きが重なり合い、人々を鼓舞する存在となる。その光を隠す必要はない。","gift":"存在そのものでステージを創る力","shadow":"目立つことは傲慢だという思い込み","mantra":"我が炎で世を照らせ"},"乙女座":{"title":"精錬される火","flower":"赤いコスモス","reading":"炎の種が緻密な職人の器に落ちた。あなたの情熱は細部に宿る。大きなビジョンを持ちながら、一つひとつを丁寧に仕上げていく。その完璧主義の奥に、世界を変える炎がある。","gift":"情熱を精密な技術へと昇華させる力","shadow":"完璧でなければ動いてはいけないという思い込み","mantra":"炎は細部に宿る"},"天秤座":{"title":"和解の炎","flower":"赤いチューリップ","reading":"開拓の炎が美と調和の器に宿った。あなたは争いを避けながらも、内側では常に正義への情熱が燃えている。その炎が人々の間に橋をかけ、新しい関係性を切り拓く。","gift":"情熱を対話と美に変換する力","shadow":"主張することは関係を壊すという思い込み","mantra":"炎は橋となる"},"蠍座":{"title":"深淵の業火","flower":"深紅のバラ","reading":"炎の種が深海の器に沈んだ。表には見えぬが、その熱は核心まで届く。あなたの情熱は表面的な華やかさではなく、魂の奥深くで相手を変容させる力を持つ。","gift":"魂の深部に触れ人を根本から変える力","shadow":"信じた相手に裏切られることへの恐怖","mantra":"深き炎が真実を照らす"},"射手座":{"title":"地平線の炎","flower":"オレンジのデイジー","reading":"開拓者の炎が自由の弓手の器に宿った。あなたは地平線の向こうへ向かって矢を放ち続ける。その情熱は国境も常識も越えて、まだ見ぬ世界へと人々を誘う。","gift":"可能性の地平を常に押し広げる力","shadow":"自由と責任は相反するという思い込み","mantra":"炎よ、星まで届け"},"山羊座":{"title":"頂を目指す炎","flower":"エーデルワイス","reading":"炎の種が忍耐の登山家の器に宿った。あなたの情熱は派手には燃えない。しかし長い時間をかけて、確実に頂を目指す。その炎は雪山の中でも消えることがない。","gift":"情熱を長期的な達成へと転化する力","shadow":"苦労なき成功は本物ではないという思い込み","mantra":"炎は山頂で輝く"},"水瓶座":{"title":"革命の炎","flower":"青いアネモネ","reading":"開拓の炎が革命家の器に宿った。あなたは既存の枠組みを壊し、まだ誰も見たことのない未来を切り拓く。その情熱は個人の欲望ではなく、人類全体への贈り物だ。","gift":"時代を先取りして新しい世界を創る力","shadow":"理解されることを待つ必要があるという思い込み","mantra":"炎は未来を燃やす"},"魚座":{"title":"聖なる炎","flower":"赤い睡蓮","reading":"炎の種が深い海の夢想家の器に宿った。あなたの情熱は見えない世界へと向かう。現実と幻想の境界で炎を灯し、人々に見えない真実を照らして見せる。","gift":"霊的な炎で人の魂に光を灯す力","shadow":"現実的でなければ認められないという思い込み","mantra":"炎は夢の中で永遠に燃える"}},"牡牛座":{"牡羊座":{"title":"大地を駆ける種","flower":"向日葵","reading":"豊かさの種が開拓者の器に落ちた。外見は行動的で真っ先に動くが、内側には揺るぎない美意識と価値観がある。衝動的に見えて実は深く吟味している。その直感は大地の声だ。","gift":"行動力と審美眼を同時に持つ力","shadow":"立ち止まることは負けだという思い込み","mantra":"大地よ、今ここで咲け"},"牡牛座":{"title":"豊穣の双つ","flower":"牡丹","reading":"天も地も豊かさの星。あなたは五感で世界を受け取り、美しいものを生み出す天才だ。焦る必要はない。季節が巡るように、あなたの花は必ず満開になる。","gift":"美と豊かさを現実に結晶させる力","shadow":"もっと準備が整ってから始めるべきという思い込み","mantra":"私は大地、必ず実る"},"双子座":{"title":"語る大地","flower":"ミモザ","reading":"豊かさの種が言葉の器に宿った。あなたは美しいものや価値あるものを、言葉で伝える才能がある。五感で感じた豊かさを物語にして、多くの人の心に種を蒔く。","gift":"感覚的な豊かさを言葉で伝播させる力","shadow":"知識が十分でなければ語れないという思い込み","mantra":"言葉が大地を豊かにする"},"蟹座":{"title":"守られた実り","flower":"白いバラ","reading":"豊かさの種が慈愛の器に包まれた。あなたは家族や大切な人に豊かさをもたらすことに喜びを感じる。その愛情は食卓の温もりであり、魂の安らぎとなって人々に届く。","gift":"愛する人の心と体を満たす力","shadow":"自分が満たされる前に与え続けなければという思い込み","mantra":"与えることが豊かさの源"},"獅子座":{"title":"黄金の王国","flower":"黄金のユリ","reading":"豊穣の種が王の器に宿った。あなたは美と豊かさを舞台に乗せる。その存在が場を豊かにし、人々に「もっと良い人生がある」と気づかせる。豊かさを恥じず、堂々と纏え。","gift":"豊かさと美を体現して人を鼓舞する力","shadow":"贅沢を望むことは浅ましいという思い込み","mantra":"豊かさは輝く権利だ"},"乙女座":{"title":"丁寧な収穫","flower":"ラベンダー","reading":"豊かさの種が緻密な職人の器に落ちた。あなたは細部まで丁寧に整えることで本物の豊かさを生み出す。質を妥協しない姿勢が、長く愛されるものを世に残す。","gift":"本物の質を見極め形にする職人の力","shadow":"完全でないものは世に出す価値がないという思い込み","mantra":"丁寧さが豊かさを生む"},"天秤座":{"title":"美の調停者","flower":"ピンクのバラ","reading":"豊かさと美の種が調和の器に宿った。あなたは美しいものを選び、人々の間に心地よい空間を作り出す。その審美眼が関係を豊かにし、争いを優雅に溶かす。","gift":"美と調和で人の心を豊かにする力","shadow":"波風を立てずに全員を満足させられるという思い込み","mantra":"美が世界を整える"},"蠍座":{"title":"地底の宝","flower":"黒いチューリップ","reading":"豊かさの種が深淵の器に沈んだ。あなたの豊かさは表面には現れない。深く潜るほど価値あるものを見つける嗅覚がある。人が見落とすものの中に、真の財を見出す。","gift":"隠れた価値を掘り起こし変容させる力","shadow":"豊かさを人に見せると奪われるという思い込み","mantra":"深みにこそ宝がある"},"射手座":{"title":"旅する豊穣","flower":"オレンジのマリーゴールド","reading":"豊かさの種が自由の器に宿った。あなたは旅と探求の中で豊かさを発見する。一か所に留まらず、世界中から美と実りを集めて帰ってくる。その体験が人生の財産だ。","gift":"世界を旅して豊かさを持ち帰る力","shadow":"定住することが豊かさへの近道という思い込み","mantra":"旅の先に実りがある"},"山羊座":{"title":"山の実り","flower":"白いエーデルワイス","reading":"豊かさの種が忍耐の器に落ちた。あなたは時間をかけて着実に豊かさを積み上げる。焦らず、腐らず、地道に積み重ねたものが、やがて誰も真似できない財産となる。","gift":"長期的視点で本物の豊かさを築く力","shadow":"楽に豊かになることは許されないという思い込み","mantra":"時が実りを育てる"},"水瓶座":{"title":"未来の豊穣","flower":"青いデルフィニウム","reading":"豊かさの種が革新の器に宿った。あなたは新しい形の豊かさを人類にもたらす。物質だけではなく、アイデアや繋がりの中に真の実りを見出し、未来へと手渡す。","gift":"新時代の豊かさの概念を創造する力","shadow":"豊かさとは物質的なものだという思い込み","mantra":"未来が豊かさを定義する"},"魚座":{"title":"夢の実り","flower":"水仙","reading":"豊かさの種が夢想の器に落ちた。あなたは目に見えない豊かさを感じ取る。音楽、詩、祈り、夢——そういった形なきものの中に、魂を満たす真の実りを見出す。","gift":"魂の豊かさを感受し他者に分かち合う力","shadow":"形にならないものには価値がないという思い込み","mantra":"夢が最も豊かな実り"}},"双子座":{"牡羊座":{"title":"疾風の言葉","flower":"タンポポ","reading":"知と言葉の種が開拓者の器に宿った。あなたは思いついたそばから言葉にして世界へ放つ。その言葉は風のように速く、炎のように人々の心に火をつける。考えるより先に語れ。","gift":"瞬時にアイデアを言葉にして場を動かす力","shadow":"考えを整理してから話さなければという思い込み","mantra":"言葉が道を切り拓く"},"牡牛座":{"title":"根付く言葉","flower":"スズラン","reading":"風の種が大地の器に落ちた。あなたの言葉は軽やかでありながら、不思議と人の心に深く根を張る。知識を現実の価値へと変換する稀な才能を持つ。","gift":"知識を具体的な価値と豊かさに変える力","shadow":"一つのことを極めなければ信用されないという思い込み","mantra":"言葉が大地に根を張る"},"双子座":{"title":"無限の風","flower":"コスモス","reading":"天も地も風と言葉の星。あなたの好奇心に終わりはなく、世界はいつも新しい発見に満ちている。その軽やかさが最大の才能。どこにいても風を起こせる。","gift":"無限の好奇心で世界を面白くする力","shadow":"一つのことに集中しなければ成功できないという思い込み","mantra":"風は自由に吹く"},"蟹座":{"title":"家族への詩","flower":"白いコスモス","reading":"言葉の種が慈愛の器に宿った。あなたは愛する人への言葉を誰よりも大切にする。その優しい言葉が家族や友人の心の拠り所となり、見えない絆を紡いでいく。","gift":"愛を言葉にして人の心を安らかにする力","shadow":"感情を言葉にすると重くなるという思い込み","mantra":"優しい言葉が絆を作る"},"獅子座":{"title":"舞台の語り手","flower":"黄色いガーベラ","reading":"言葉の種が表現者の器に宿った。あなたは舞台の上で言葉を武器に人々を魅了する。ユーモアと知性が合わさり、その場を一瞬で変える力がある。","gift":"言葉と表現で人を魅了し舞台を作る力","shadow":"知的すぎると面白くないという思い込み","mantra":"言葉が舞台を照らす"},"乙女座":{"title":"精密な言語","flower":"白いデイジー","reading":"言葉の種が職人の器に落ちた。あなたは言葉を精密に操る。曖昧を許さず、正確に伝えることへのこだわりが、信頼される文章と言葉を生み出す。","gift":"言葉を精密に操り本質を伝える力","shadow":"すべてを説明し尽くさなければ伝わらないという思い込み","mantra":"正確な言葉が真実を映す"},"天秤座":{"title":"対話の風","flower":"藤","reading":"言葉の種が調和の器に宿った。あなたは対話の天才だ。どんな立場の人とも言葉を交わし、その間に橋をかける。あなたの会話が争いを溶かし、新しい可能性を生む。","gift":"対話で人と人の間に橋をかける力","shadow":"全員が納得する言葉など存在しないという思い込み","mantra":"言葉が橋となる"},"蠍座":{"title":"深淵の言葉","flower":"紫のアイリス","reading":"言葉の種が深海の器に沈んだ。あなたの言葉は表面的な情報ではなく、魂の核心を突く。人が言語化できない感情を言葉にし、静かに相手の内側を変容させる。","gift":"言葉で魂の深部に触れ変容を促す力","shadow":"深く知ることは傷つくことだという思い込み","mantra":"深い言葉が魂を動かす"},"射手座":{"title":"地平線の言葉","flower":"黄色いチューリップ","reading":"言葉の種が自由の器に宿った。あなたの言葉は国境も常識も越えて飛んでいく。哲学と物語が合わさり、まだ見ぬ真実へと人々を誘う。","gift":"言葉で人の視野を宇宙規模に広げる力","shadow":"真実は一つだという思い込み","mantra":"言葉は地平線を越える"},"山羊座":{"title":"刻まれる言葉","flower":"白いカーネーション","reading":"言葉の種が忍耐の器に落ちた。あなたの言葉は時間をかけて磨かれ、石に刻まれるように人の記憶に残る。軽やかな知性と地道な積み重ねが、歴史に残る言葉を生む。","gift":"時を超えて残る言葉を紡ぐ力","shadow":"すぐに結果が出なければ意味がないという思い込み","mantra":"言葉は時を超える"},"水瓶座":{"title":"革命の言葉","flower":"青いヤグルマギク","reading":"言葉の種が革新の器に宿った。あなたの言葉は時代を先取りし、まだ存在しない概念を言語化する。その言葉が種となり、未来の革命を静かに準備する。","gift":"時代を変える概念を最初に言語化する力","shadow":"理解されない言葉に価値はないという思い込み","mantra":"言葉が未来を創る"},"魚座":{"title":"夢の言葉","flower":"青いアネモネ","reading":"言葉の種が夢の器に落ちた。あなたは見えない世界を言葉にする詩人だ。論理を超えた言語が、人の無意識に届き、魂の深いところを癒し、目覚めさせる。","gift":"見えない世界を言葉で現実に橋渡しする力","shadow":"論理的でない言葉は信用されないという思い込み","mantra":"夢の言葉が魂に届く"}},"蟹座":{"牡羊座":{"title":"守護の炎","flower":"赤いカーネーション","reading":"慈愛の種が開拓者の器に宿った。あなたは愛する人を守るために誰よりも勇敢に動く。外には果敢な戦士に見えるが、その行動のすべては深い愛情から生まれている。","gift":"愛する者のために誰より勇敢に動ける力","shadow":"強くなければ守れないという思い込み","mantra":"愛が最強の盾となる"},"牡牛座":{"title":"大地の母","flower":"白い牡丹","reading":"慈愛の種が豊かな大地の器に落ちた。あなたは人々の心と体を同時に満たす。温かい食事、安らぎの場所、心地よい空間——その手から生まれるすべてが愛の形だ。","gift":"人の心と体を同時に癒し満たす力","shadow":"自分を後回しにして与えることが愛だという思い込み","mantra":"満たされた大地が人を育む"},"双子座":{"title":"言葉の揺りかご","flower":"白いコスモス","reading":"慈愛の種が言葉の器に宿った。あなたの言葉は人の心を包み込む。情報を伝えるのではなく、感情を受け取り、優しい言葉で包んで返す。その言葉が傷を癒す。","gift":"言葉で人の感情を受け取り癒す力","shadow":"論理的でなければ言葉に価値がないという思い込み","mantra":"優しい言葉が心を包む"},"蟹座":{"title":"深海の愛","flower":"白い睡蓮","reading":"天も地も慈愛の水。あなたの感受性は他の誰とも比べられないほど深い。その深さゆえに傷つくこともあるが、同じ深さで人を愛し、癒すことができる。","gift":"深い共感で人の魂に触れる力","shadow":"感じすぎることは弱さだという思い込み","mantra":"深い愛は深い海のように"},"獅子座":{"title":"愛の女王","flower":"ピンクのバラ","reading":"慈愛の種が王の器に宿った。あなたは愛情を豊かに表現し、人々を温かく照らす。その存在自体が人々の心の太陽となり、周囲に安心と喜びをもたらす。","gift":"愛を堂々と表現して人の心を照らす力","shadow":"愛情表現は重いと思われるという思い込み","mantra":"愛を輝かせよ"},"乙女座":{"title":"細やかな愛","flower":"白いスミレ","reading":"慈愛の種が緻密な職人の器に落ちた。あなたの愛は細部に宿る。気づかれないような小さな気遣いの積み重ねが、人の心に深く刻まれる本物の愛となる。","gift":"細やかな気遣いで人の心を深く支える力","shadow":"完璧なケアができなければ愛とは言えないという思い込み","mantra":"細やかさが愛の証"},"天秤座":{"title":"調和の愛","flower":"ピンクのスイートピー","reading":"慈愛の種が調和の器に宿った。あなたは人と人の間の感情の橋渡し役だ。誰かが傷ついているとき、その痛みを感じ取り、バランスを取り戻す優しさを持つ。","gift":"感情を感じ取り人間関係を調和させる力","shadow":"全員の感情を引き受けなければならないという思い込み","mantra":"愛が調和を生む"},"蠍座":{"title":"魂の絆","flower":"深紅のバラ","reading":"慈愛の種が深淵の器に沈んだ。あなたの愛は表面ではなく、魂の奥深くで結ばれる。一度心を許した相手とは永遠の絆を結び、その深い愛が相手を変容させる。","gift":"魂の深部で結ばれる変容的な愛の力","shadow":"愛した分だけ傷つくという思い込み","mantra":"深き愛は魂を変える"},"射手座":{"title":"世界への愛","flower":"オレンジのガーベラ","reading":"慈愛の種が自由の器に宿った。あなたの愛は家族だけに留まらず、世界全体へと広がる。旅と探求の中で出会う人々を愛し、その愛が地球を少し温かくする。","gift":"出会うすべての人を愛し世界を温かくする力","shadow":"深く愛すると自由を失うという思い込み","mantra":"愛は世界を旅する"},"山羊座":{"title":"永遠の愛","flower":"白いカスミソウ","reading":"慈愛の種が忍耐の器に落ちた。あなたの愛は派手には見えないが、長い時間をかけて積み上げられる。約束を守り続け、傍に居続けることが、あなたの愛の言語だ。","gift":"時間をかけて積み上げる永続する愛の力","shadow":"感情を見せることは弱さだという思い込み","mantra":"愛は時間とともに深まる"},"水瓶座":{"title":"人類への愛","flower":"青いデルフィニウム","reading":"慈愛の種が革新の器に宿った。あなたの愛は個人を超えて人類全体へと向かう。社会の痛みを感じ取り、それを変えようとする行動がすべて愛から発している。","gift":"個を超えた人類への愛を行動に変える力","shadow":"感情的になることは客観性を失うという思い込み","mantra":"愛が社会を変える"},"魚座":{"title":"宇宙の愛","flower":"紫の睡蓮","reading":"慈愛の種が夢の器に落ちた。あなたの愛は境界を持たない。人間だけでなく、生き物すべて、見えない存在までを包み込む宇宙的な慈愛があなたの本質だ。","gift":"すべての存在を包む宇宙的な慈愛の力","shadow":"境界を持たないと自分が消えるという思い込み","mantra":"愛に境界はない"}},"獅子座":{"牡羊座":{"title":"太陽の先駆者","flower":"向日葵","reading":"輝きの種が開拓者の器に宿った。あなたは誰よりも先に舞台に立ち、その輝きで道を照らす。自己表現と行動力が合わさり、あなたの存在自体が革命の狼煙となる。","gift":"自らの輝きで新しい時代の扉を開く力","shadow":"認められなければ輝く意味がないという思い込み","mantra":"我が輝きが道を作る"},"牡牛座":{"title":"黄金の芸術家","flower":"黄金のバラ","reading":"輝きの種が豊かな大地の器に落ちた。あなたは美しいものを作り出す芸術家だ。その表現は一時的な华やかさではなく、時代を超えて人の心に残る本物の輝きを放つ。","gift":"永続する美と輝きを創造する力","shadow":"華やかさと品格は両立しないという思い込み","mantra":"美が永遠に輝く"},"双子座":{"title":"光の語り手","flower":"黄色いコスモス","reading":"輝きの種が言葉の器に宿った。あなたは話すだけで場が明るくなる。知性とエンターテイメントが合わさり、人々を笑わせ、感動させ、気づかせる。その言葉は太陽だ。","gift":"言葉と表現で人の心を明るく照らす力","shadow":"深刻でなければ重要でないという思い込み","mantra":"言葉よ、太陽のように輝け"},"蟹座":{"title":"家族の太陽","flower":"ひまわり","reading":"輝きの種が慈愛の器に宿った。あなたは家族や大切な人たちにとっての太陽だ。その温かい輝きが人々に安心と勇気を与え、傍にいるだけで心が明るくなる。","gift":"愛する人の心を照らし勇気を与える力","shadow":"自分が輝くと周囲が嫉妬するという思い込み","mantra":"愛する人の太陽となれ"},"獅子座":{"title":"真の王","flower":"赤いバラ","reading":"天も地も輝きの星。あなたは生まれながらの王だ。その輝きは努力で作るものではなく、ただ在るだけで放たれる。王は王冠を求めない。王が立てば王冠が来る。","gift":"在るだけで場を支配する王者の輝き","shadow":"もっと認められなければ本物の王ではないという思い込み","mantra":"我は王、既に輝いている"},"乙女座":{"title":"完璧な光","flower":"白いダリア","reading":"輝きの種が職人の器に落ちた。あなたの表現は緻密で完璧だ。細部まで磨き上げられた輝きは、見る人の目を奪い、長く記憶に残る。完璧さが最大の輝きとなる。","gift":"細部まで磨き上げて完璧な輝きを放つ力","shadow":"完璧でなければ人前に出てはいけないという思い込み","mantra":"磨かれた光は永遠に輝く"},"天秤座":{"title":"美の主役","flower":"ピンクのダリア","reading":"輝きの種が調和の器に宿った。あなたは美しい場と関係性の中心に立つ。その優雅な輝きが周囲を引き立て、すべてを調和させる。美の中心にいることがあなたの天命だ。","gift":"美と調和の中心で場全体を輝かせる力","shadow":"目立つことで人を傷つけるという思い込み","mantra":"美の中心で輝け"},"蠍座":{"title":"深淵の光","flower":"深紅のダリア","reading":"輝きの種が深淵の器に沈んだ。あなたの輝きは表面的な华やかさではなく、魂の深部から放たれる。その光は暗闇の中でこそ最も眩しく、人の魂に直接届く。","gift":"暗闇の中で最も輝く魂の光を放つ力","shadow":"輝けば傷つくという思い込み","mantra":"深き光が闇を照らす"},"射手座":{"title":"冒険する太陽","flower":"オレンジのヒマワリ","reading":"輝きの種が自由の器に宿った。あなたは旅の中で輝く。新しい場所、新しい人々、新しい思想——そのすべてがあなたの輝きを増す燃料となる。世界があなたの舞台だ。","gift":"世界を舞台に自由に輝き続ける力","shadow":"一か所に留まることで輝きが増すという思い込み","mantra":"太陽は旅をして輝く"},"山羊座":{"title":"不滅の光","flower":"白いユリ","reading":"輝きの種が忍耐の器に落ちた。あなたの輝きは一夜限りの华火ではない。長い時間をかけて磨かれ、積み上げられた実績の上に立つ輝きは、永遠に消えない。","gift":"時間と努力で磨かれた不滅の輝きを放つ力","shadow":"若いうちに輝けなければ遅すぎるという思い込み","mantra":"時が輝きを不滅にする"},"水瓶座":{"title":"未来の光","flower":"青いヒヤシンス","reading":"輝きの種が革新の器に宿った。あなたの輝きは現在ではなく未来を照らす。時代の先を行くその光が、まだ見ぬ世界への道を照らし、人々を引っ張っていく。","gift":"未来を照らし人類を先導する光を放つ力","shadow":"今理解されなければ輝いていないという思い込み","mantra":"未来に向けて輝け"},"魚座":{"title":"神聖な光","flower":"白い睡蓮","reading":"輝きの種が夢の器に落ちた。あなたの輝きは現実世界だけでなく、見えない領域をも照らす。その神聖な光が人々の魂を目覚めさせ、夢と現実の境界を溶かす。","gift":"見えない世界をも照らす神聖な光を放つ力","shadow":"現実的でなければ輝きに意味がないという思い込み","mantra":"神聖な光が魂を照らす"}},"乙女座":{"牡羊座":{"title":"精密な開拓者","flower":"白いコスモス","reading":"緻密な種が開拓者の器に宿った。あなたは直感で動きながら、細部を見落とさない。行動の速さと分析の鋭さが合わさり、誰も気づかぬ問題を先に解決してしまう。","gift":"素早く動きながら細部を完璧に整える力","shadow":"完璧な計画なしに動いてはいけないという思い込み","mantra":"精密さが道を拓く"},"牡牛座":{"title":"職人の大地","flower":"白いバラ","reading":"緻密な種が豊かな大地の器に落ちた。あなたは本物だけを選び、丁寧に育てる。質への妥協を知らないその姿勢が、長く愛される作品と関係性を生み出す。","gift":"本物を見極め丁寧に育てる職人の力","shadow":"完全なものだけに価値があるという思い込み","mantra":"丁寧さが本物を生む"},"双子座":{"title":"分析の言葉","flower":"白いデイジー","reading":"緻密な種が言葉の器に宿った。あなたは複雑な情報を整理し、誰にでもわかる言葉に変える天才だ。その明快な言葉が人々の混乱を解き、道筋を示す。","gift":"複雑な情報を明快な言葉に変換する力","shadow":"すべてを説明しなければ伝わらないという思い込み","mantra":"明快な言葉が霧を晴らす"},"蟹座":{"title":"細やかな愛","flower":"白いスミレ","reading":"緻密な種が慈愛の器に宿った。あなたの愛は言葉より行動に現れる。相手が言わなかったことに気づき、求める前に手を差し伸べる。その細やかさが本物の愛だ。","gift":"言葉より行動で細やかに人を支える力","shadow":"完璧にケアできなければ愛していないという思い込み","mantra":"細やかな行動が愛を示す"},"獅子座":{"title":"完璧な舞台","flower":"白いダリア","reading":"緻密な種が輝きの器に宿った。あなたは舞台の裏側まで完璧に整えてから表舞台に立つ。その徹底した準備が本物の輝きを生み、見る者を圧倒する。","gift":"完璧な準備で圧倒的な輝きを放つ力","shadow":"準備が整うまで舞台に立てないという思い込み","mantra":"完璧な準備が輝きを生む"},"乙女座":{"title":"純粋な職人","flower":"白いカモミール","reading":"天も地も緻密さの星。あなたの完璧主義は天と地から与えられた使命だ。細部への敬意が、他の誰も到達できないレベルの作品を生み出す。","gift":"天と地から授かった究極の緻密さ","shadow":"完璧でない自分は価値がないという思い込み","mantra":"細部に神が宿る"},"天秤座":{"title":"美の調律師","flower":"白いスイートピー","reading":"緻密な種が調和の器に宿った。あなたは美しいバランスを精密に整える。関係性のわずかなズレを感知し、さりげなく修正するその技術が、場全体を完璧に整える。","gift":"精密な感覚で美と調和を完璧に整える力","shadow":"完璧なバランスなど存在しないという思い込み","mantra":"精密さが調和を生む"},"蠍座":{"title":"深層の分析家","flower":"白いアイリス","reading":"緻密な種が深淵の器に沈んだ。あなたは表面ではなく、構造の核心を見る。人が見えないものを分析し、問題の根本原因を正確に特定する。その洞察は鋭利な刃だ。","gift":"物事の核心を精密に分析し根本を変える力","shadow":"真実を知ることは傷つくことだという思い込み","mantra":"精密な眼が真実を見る"},"射手座":{"title":"旅する職人","flower":"白いコスモス","reading":"緻密な種が自由の器に宿った。あなたは世界を旅しながら、どこでも細部を見落とさない。広大なビジョンと精密な実行力が合わさり、スケールの大きな作品を生む。","gift":"広大なビジョンを精密に実現する力","shadow":"細かいことを気にすると自由を失うという思い込み","mantra":"精密さが大きな夢を実現する"},"山羊座":{"title":"不変の精度","flower":"白いカーネーション","reading":"緻密な種が忍耐の器に落ちた。あなたは長い時間をかけて技術を磨く。その精度は年々上がり続け、誰も追いつけない領域へと到達する。時間が最大の武器だ。","gift":"時間をかけて誰も到達できない精度に達する力","shadow":"早く完成させなければ価値がないという思い込み","mantra":"時が精度を極限まで高める"},"水瓶座":{"title":"システムの革新者","flower":"白い矢車菊","reading":"緻密な種が革新の器に宿った。あなたは既存のシステムの欠陥を正確に分析し、より完璧な仕組みを設計する。その精密な革新が社会全体を改善する。","gift":"システムを精密に分析し完璧な革新を起こす力","shadow":"細かすぎて全体が見えなくなるという思い込み","mantra":"精密な革新が世界を変える"},"魚座":{"title":"見えない秩序","flower":"白い睡蓮","reading":"緻密な種が夢の器に落ちた。あなたは混沌の中に隠れた秩序を見出す。直感と分析が融合し、言葉にできない真実を形にする。見えない世界に精密さをもたらす。","gift":"混沌から隠れた秩序と美を見出す力","shadow":"論理と直感は相反するという思い込み","mantra":"混沌の中に完璧な秩序がある"}},"天秤座":{"牡羊座":{"title":"正義の剣","flower":"ラベンダー","reading":"調和の種が開拓者の器に宿った。あなたは不公正を見ると黙っていられない。美しい世界への情熱が行動力と合わさり、誰も踏み込まなかった場所に正義の旗を立てる。","gift":"美と正義のために真っ先に行動できる力","shadow":"争いを避けながら正義を実現できるという思い込み","mantra":"正義のために剣を抜け"},"牡牛座":{"title":"美の庭園","flower":"ピンクのバラ","reading":"調和の種が豊かな大地の器に落ちた。あなたは美しい空間と豊かな関係性を同時に育てる。その審美眼と粘り強さが、誰もが訪れたくなる場所と関係性を作り出す。","gift":"美しい空間と豊かな人間関係を同時に育てる力","shadow":"美しさと実用性は両立しないという思い込み","mantra":"美が豊かさを育む"},"双子座":{"title":"対話の芸術家","flower":"藤","reading":"調和の種が言葉の器に宿った。あなたは対話そのものを芸術にする。どんな意見も美しく整理し、異なる立場の人々を笑顔で繋ぐ。言葉が平和を生み出す。","gift":"対話を芸術に変え人々を繋ぐ力","shadow":"全員が同意する結論がなければ失敗だという思い込み","mantra":"言葉が平和を織りなす"},"蟹座":{"title":"関係の守護者","flower":"ピンクのスイートピー","reading":"調和の種が慈愛の器に宿った。あなたは人間関係の微妙なバランスを感じ取り、壊れかけた絆を優しく修復する。その調停力が、コミュニティに平和をもたらす。","gift":"壊れかけた絆を優しく修復する力","shadow":"関係を保つためには自分を犠牲にすべきという思い込み","mantra":"愛が調和を守る"},"獅子座":{"title":"美の女王","flower":"ピンクのダリア","reading":"調和の種が輝きの器に宿った。あなたは美の体現者として舞台に立つ。その優雅な存在感が場 var SIGNS=[
  {name:"牡羊座",sym:"♈",el:"火"},{name:"牡牛座",sym:"♉",el:"地"},
  {name:"双子座",sym:"♊",el:"風"},{name:"蟹座",sym:"♋",el:"水"},
  {name:"獅子座",sym:"♌",el:"火"},{name:"乙女座",sym:"♍",el:"地"},
  {name:"天秤座",sym:"♎",el:"風"},{name:"蠍座",sym:"♏",el:"水"},
  {name:"射手座",sym:"♐",el:"火"},{name:"山羊座",sym:"♑",el:"地"},
  {name:"水瓶座",sym:"♒",el:"風"},{name:"魚座",sym:"♓",el:"水"}
];

function toSign(lon){
  return SIGNS[Math.floor(((lon%360)+360)%360/30)];
}

function calcAstro(year,month,day,hour,min,lat,lng){
  var utcDate=new Date(Date.UTC(year,month-1,day,hour-9,min,0));
  var JD=utcDate.getTime()/86400000+2440587.5;
  var T=(JD-2451545.0)/36525;
  var L0=((280.46646+36000.76983*T)%360+360)%360;
  var M=(357.52911+35999.05029*T-0.0001537*T*T)*Math.PI/180;
  var C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(M)
       +(0.019993-0.000101*T)*Math.sin(2*M)
       +0.000289*Math.sin(3*M);
  var sunLon=((L0+C)%360+360)%360;
  var helioLon=(sunLon+180)%360;
  var GMST=((280.46061837+360.98564736629*(JD-2451545.0))%360+360)%360;
  var LST=((GMST+lng)%360+360)%360;
  var eps=(23.439291111-0.013004167*T)*Math.PI/180;
  var LSTR=LST*Math.PI/180;
  var latR=lat*Math.PI/180;
  var ascRad=Math.atan2(Math.cos(LSTR),-(Math.sin(LSTR)*Math.cos(eps)+Math.tan(latR)*Math.sin(eps)));
  var asc=((ascRad*180/Math.PI)%360+360)%360;
  return{
    geo:{sign:toSign(sunLon),lon:sunLon},
    helio:{sign:toSign(helioLon),lon:helioLon},
    asc:{sign:toSign(asc),lon:asc}
  };
}

var AR=null;

function toggleTime(cb){
  var h=document.getElementById("hour");
  var m=document.getElementById("min");
  h.disabled=cb.checked;
  m.disabled=cb.checked;
  if(cb.checked){h.value="";m.value="";}
}

function calculate(){
  var yearEl=document.getElementById("year");
  var monthEl=document.getElementById("month");
  var dayEl=document.getElementById("day");
  var hourEl=document.getElementById("hour");
  var minEl=document.getElementById("min");
  var latEl=document.getElementById("lat");
  var lngEl=document.getElementById("lng");

  var year=parseInt(yearEl.value);
  var month=parseInt(monthEl.value);
  var day=parseInt(dayEl.value);
  var timeUnknown=document.getElementById("timeUnknown").checked;
  var hour=timeUnknown?12:(parseInt(hourEl.value)||0);
  var min=timeUnknown?0:(parseInt(minEl.value)||0);
  var lat=parseFloat(latEl.value);
  var lng=parseFloat(lngEl.value);

  if(!year||!month||!day){alert("年月日を入力してください");return;}
  if(isNaN(lat)||isNaN(lng)){alert("出生地を選択または入力してください");return;}

  try{
    AR=calcAstro(year,month,day,hour,min,lat,lng);
  }catch(e){
    alert("計算エラー: "+e.message);return;
  }

  document.getElementById("step1").classList.remove("on");
  document.getElementById("step2").classList.add("on");
  document.getElementById("sn1").className="snc done";
  document.getElementById("sl1").className="snl";
  document.getElementById("sn2").className="snc active";
  document.getElementById("sl2").className="snl active";

  showResult();
}

  document.getElementById("resultContainer").innerHTML=
    triHTML(r)
    +"<div class=\"result-hero\"><div class=\"rh-label\">この三星の名</div><div class=\"rh-title\">"+p.title+"</div><div class=\"rh-sep\"></div><div class=\"rh-flower\">— "+p.flower+" —</div></div>"
    +"<div class=\"result-reading\">"+p.reading+"</div>"
