function calcCharNo(year, month, day) {
  var row = TABLE[year];
  if (!row) return 1;
  var base = row[month - 1];
  var total = base + day;
  while (total > 60) total -= 60;
  while (total <= 0) total += 60;
  return total;
}

function go() {
  var y = parseInt(document.getElementById('yr').value);
  var m = parseInt(document.getElementById('mo').value);
  var d = parseInt(document.getElementById('dy').value);
  var gn = document.getElementById('gn').value;
  var em = document.getElementById('em');

  if (!y || !m || !d || !gn) { em.style.display='block'; return; }
  em.style.display='none';

  document.getElementById('fs').style.display='none';
  document.getElementById('ld').style.display='block';

  setTimeout(function() {
    var charNo = calcCharNo(y, m, d);
    var c = CHARS[charNo];
    if (!c) c = CHARS[1];

    // header bg
    var ah = document.getElementById('ah');
    ah.style.background = c.bg || '#f9f9f9';

    document.getElementById('asvg').innerHTML = makeSvg(c.animal);
    
    var grp = c.group || ANIMAL_GROUP[c.animal] || 'EARTH';
    var gbadge = document.getElementById('agroup');
    gbadge.textContent = GROUP_LABEL[grp];
    gbadge.className = 'gbadge ' + (GROUP_CLASS[grp] || '');

    document.getElementById('an').textContent = c.name;
    document.getElementById('ae').textContent = c.animal + ' / No.' + charNo;
    document.getElementById('acno').textContent = '六十干支 No.' + charNo + ' ｜ 動物占いの60キャラクターのうちの1つ';
    document.getElementById('adesc').textContent = c.desc;
    document.getElementById('apers').textContent = c.personality;

    var tg = document.getElementById('atrait');
    tg.innerHTML = '';
    var keys = Object.keys(c.traits);
    for (var i=0; i<keys.length; i++) {
      tg.innerHTML += '<div class="ti"><div class="tl">'+keys[i]+'</div><div class="tv">'+c.traits[keys[i]]+'</div></div>';
    }

    document.getElementById('alove').innerHTML =
      '<div class="li2"><div class="ll">❤️ 恋愛</div><div class="lv">'+c.love+'</div></div>' +
      '<div class="li2"><div class="ll">💼 仕事</div><div class="lv">'+c.work+'</div></div>';

    var cg = document.getElementById('acomp');
    cg.innerHTML = '';
    for (var j=0; j<c.compat.length; j++) { cg.innerHTML += '<div class="cb">'+c.compat[j]+'</div>'; }

    var ig = document.getElementById('aincomp');
    ig.innerHTML = '';
    for (var k=0; k<c.incompat.length; k++) { ig.innerHTML += '<div class="cb">'+c.incompat[k]+'</div>'; }

    document.getElementById('ld').style.display='none';
    document.getElementById('rs').style.display='block';
  }, 1400);
}

function resetForm() {
  document.getElementById('rs').style.display='none';
  document.getElementById('fs').style.display='block';
  document.getElementById('yr').value='';
  document.getElementById('mo').value='';
  document.getElementById('dy').value='';
  document.getElementById('gn').value='';
}
